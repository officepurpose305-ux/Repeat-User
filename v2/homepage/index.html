function getMockData(cfg) {
  const loc = cfg.location || {};
  // Check primary first (direct user input), then city (may be stale/async)
  const candidates = [loc.primary, loc.secondary, loc.city].filter(Boolean).map(s => s.toLowerCase().trim());
  const aliases = Object.keys(CITY_ALIASES).sort((a,b) => b.length - a.length);
  for (const raw of candidates) {
    for (const alias of aliases) {
      if (raw.includes(alias)) return MOCK_DATA[CITY_ALIASES[alias]];
    }
  }
  return MOCK_DATA.noida; // final default
}

// Deterministic image from pool based on property name hash
function getPropertyImage(p) {
  if (p.image_url) return p.image_url;
  const hash = (p.name||'x').split('').reduce(function(a,c){ return a + c.charCodeAt(0); }, 0);
  return PROP_IMAGES[hash % PROP_IMAGES.length];
}

// Renders property image; parent element's CSS gradient shows through on failure
function propImg(p) {
  const url = getPropertyImage(p);
  return `<img src="${esc(url)}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'" />`;
}

// Fetch with hard timeout — prevents hanging on unreachable internal API servers
function fetchWithTimeout(url, ms) {
  ms = ms || 5000;
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms);
  return fetch(url, { signal: ctrl.signal }).finally(function() { clearTimeout(timer); });
}

// Parse the scraped text format returned by /debug/search-urls
// Each listing block has: Landing URL, Listing Title, Listing Image URL, Listing Description, Posted by, Possession Status
function parseApiListings(text, fallbackLoc) {
  const results = [];
  const blocks = text.split(/\n{2,}(?=Landing URL:)/);
  for (var i = 0; i < blocks.length; i++) {
    var block = blocks[i];
    var get = function(field) {
      var m = block.match(new RegExp('^' + field + ':\\s*(.+)$', 'm'));
      return m ? m[1].trim() : '';
    };
    var title  = get('Listing Title');
    if (!title) continue;
    var desc   = get('Listing Description');
    var imgUrl = get('Listing Image URL');
    var poss   = get('Possession Status');

    var bhkM   = title.match(/(\d)\s*BHK/i);
    var bhk    = bhkM ? bhkM[1] + ' BHK' : '2 BHK';
    var nameM  = title.match(/^(.+?)\s+\d\s*BHK/i);
    var name   = nameM ? nameM[1].trim() : title;
    var locM   = title.match(/\bin\s+(.+)$/i);
    var loc    = locM ? locM[1].trim() : fallbackLoc;

    // Price: grab first ₹ amount, strip deposit/month suffix
    var priceM = desc.match(/₹[\d,]+(?:\.\d+)?(?:\s*(?:Cr|L))?(?:\s*\/month)?/);
    var price  = priceM ? priceM[0].replace(/\s*\/month/, '').trim() : '₹—';

    var sqftM  = desc.match(/([\d,]+)\s*sqft/i);
    var sqft   = sqftM ? sqftM[1].replace(/,/g, '') + ' sq ft' : '';

    var nearbyM = desc.match(/Nearby\s*:\s*(.+?)(?:\s+\+\d|$)/i);
    var lm      = nearbyM ? nearbyM[1].trim() : '';

    var rtm = /ready to move/i.test(desc) || /ready to move/i.test(poss);
    results.push({
      name, location: loc, price, sqft, bhk,
      ready_to_move: rtm,
      status: rtm ? 'Ready to move' : (poss || 'Under Construction'),
      lm, image_url: imgUrl
    });
  }
  return results.filter(function(r) { return r.name; });
}

// Apply RTM and BHK filters to any data result — runs on every data path
// so filter changes take effect immediately without re-fetching
// Parse a price string like "₹88L", "₹1.1 Cr", "₹79.5L" → value in Lakhs, or null
function parsePriceLakhs(priceStr) {
  if (!priceStr || priceStr === '₹—') return null;
  var s = priceStr.replace(/[₹,\s]/g, '');
  var crMatch = s.match(/^([\d.]+)[Cc]r$/);
  if (crMatch) return parseFloat(crMatch[1]) * 100;
  var lMatch = s.match(/^([\d.]+)[Ll]$/);
  if (lMatch) return parseFloat(lMatch[1]);
  return null;
}

function applyFilters(result, cfg) {
  var f = cfg.filters || {};
  var props = (result.properties || []).slice();

  // RTM filter — strict: respect the user's selection exactly
  if (f.readyToMove === 'yes') {
    props = props.filter(function(p) { return p.ready_to_move; });
  } else if (f.readyToMove === 'no') {
    props = props.filter(function(p) { return !p.ready_to_move; });
  }

  // BHK filter — keep any property matching one of the selected BHKs
  if (f.bhk && f.bhk.length) {
    var selectedNums = f.bhk.map(function(b) { return b.replace(/\D/g, ''); });
    var filtered = props.filter(function(p) {
      var pNum = (p.bhk || '').replace(/\D/g, '').charAt(0);
      return selectedNums.indexOf(pNum) !== -1;
    });
    // Only apply if results remain — avoids blanking the page on stale cached data
    if (filtered.length > 0) props = filtered;
  }

  // Budget filter — only apply when both min and max are set
  if (f.budgetMin && f.budgetMax) {
    var budgFiltered = props.filter(function(p) {
      var val = parsePriceLakhs(p.price);
      if (val === null) return true; // keep if unparseable
      return val >= f.budgetMin && val <= f.budgetMax;
    });
    if (budgFiltered.length > 0) props = budgFiltered;
  }

  return Object.assign({}, result, { properties: props });
}

async function fetchData(cfg) {
  var loc = cfg.location || {};
  var primary = loc.primary || '';

  // ── 1. 99acres API ──────────────────────────────────────────────────────────
  if (cfg.apiBase && primary) {
    try {
      // Fix P4: send first BHK to API (API accepts single value)
      var bedroom = ((cfg.filters.bhk||['2BHK'])[0]||'2BHK').replace(/\D/g,'') || '2';
      var locationQuery = primary + (loc.city && loc.city !== primary ? ' '+loc.city : '');

      var debugRes = await fetchWithTimeout(cfg.apiBase+'/debug/entities?text='+encodeURIComponent(locationQuery), 5000);
      var entities = {};
      if (debugRes.ok) entities = (await debugRes.json()).entities || {};
      entities.bedroom       = bedroom;
      entities.preference    = entities.preference || 'S'; // Fix P6: 'S' = Sale, not 'R' = Rent
      entities.property_type = entities.property_type || '1';
      // Fix P2: pass RTM to API
      if ((cfg.filters||{}).readyToMove === 'yes') entities.ready_to_move = true;

      var searchRes = await fetchWithTimeout(
        cfg.apiBase+'/debug/search-urls?entities='+encodeURIComponent(JSON.stringify(entities)), 5000
      );
      if (searchRes.ok) {
        var j = await searchRes.json();
        var pageContent = (j.content && j.content[0] && j.content[0].page_content) || '';
        var raw = parseApiListings(pageContent, primary);
        if (raw.length >= 2) {
          return { properties: raw, localities: [], adjacentLocalities: [], landmarks: {} };
        }
      }
    } catch(_) {
      // API unreachable or timed out — fall through immediately
    }
  }

  // ── 2. OpenAI pre-fetched by panel (Apply button) ───────────────────────────
  if (cfg.openAIData && cfg.openAIData.properties && cfg.openAIData.properties.length) {
    return {
      properties:         cfg.openAIData.properties         || [],
      localities:         cfg.openAIData.localities         || [],
      adjacentLocalities: cfg.openAIData.adjacentLocalities || [],
      landmarks:          cfg.openAIData.landmarks          || {}
    };
  }

  // ── 3. Direct OpenAI call (key from panel config OR window global) ───────────
  var oaiKey = cfg.openAIKey || (typeof window !== 'undefined' && window.OPENAI_API_KEY) || '';
  if (oaiKey && primary) {
    try {
      var aiCfg = Object.assign({}, cfg, { openAIKey: oaiKey });
      return await fetchFromOpenAI(aiCfg);
    } catch(_) {
      // OpenAI failed — fall through to mock data
    }
  }

  // ── 4. City-matched mock data (always available) ─────────────────────────────
  if (primary) return getMockData(cfg);
  return { properties:[], localities:[], adjacentLocalities:[], landmarks:{} };
}

// Normalize any API response shape → homepage property shape
function normalizeProps(raw, fallbackLoc) {
  return raw.map(function(p) {
    // Price: try various field names, fallback to computing from min_price
    const priceL = p.min_price ? Math.round(p.min_price / 100000) : null;
    const priceCr = priceL && priceL >= 100 ? (priceL/100).toFixed(2)+' Cr' : null;
    const priceStr = p.price_str || p.PRICE || p.price
      || (priceCr ? '₹'+priceCr : priceL ? '₹'+priceL+'L' : '₹—');
    // Sqft
    const area = p.carpet_area || p.SUPER_AREA || p.built_up_area || p.area || '';
    const sqft = area ? (typeof area === 'number' ? area+' sq ft' : area) : '';
    // BHK
    const bhk = p.bhk_types || p.BEDROOM_NUM || p.bedroom_num
      || (p.bedroom ? p.bedroom+' BHK' : p.PROP_BED ? p.PROP_BED+' BHK' : '2 BHK');
    // Name / developer
    const name = p.project_name || p.PROP_NAME || p.name || p.title || 'Property';
    const dev  = p.developer || p.DEVELOPER || p.company_name || '';
    // Location
    const loc  = p.location || p.address || p.locality_name
      || (p.LOCALITY_NAME ? p.LOCALITY_NAME+', '+p.CITY_NAME : fallbackLoc);
    // Status
    const rtm  = p.ready_to_move === true || p.ready_to_move === 1
      || (typeof p.status === 'string' && /ready/i.test(p.status))
      || (typeof p.STATUS === 'string' && /ready/i.test(p.STATUS));
    const status = p.status || p.STATUS || (rtm ? 'Ready to move' : 'Under Construction');
    return {
      name, dev, location: loc, price: priceStr, sqft,
      bhk: typeof bhk === 'number' ? bhk+' BHK' : bhk,
      status, ready_to_move: rtm,
      lm: p.lm || p.landmark || '',
      image_url: p.image_url || p.PHOTO_URL || p.photo || ''
    };
  });
}

async function fetchFromOpenAI(cfg) {
  const loc = cfg.location||{}, f = cfg.filters||{};
  const bhk = (f.bhk||[]).join(', ')||'2 BHK';
  const budget = f.budgetMax ? '₹'+f.budgetMin+'L–₹'+f.budgetMax+'L' : 'flexible';
  const city = loc.city||loc.primary||'';
  const prompt = `Real estate data for India. Return ONLY valid JSON, no markdown.
City: ${city}, Locality: ${loc.primary||city}, Budget: ${budget}, BHK: ${bhk}
Shape:
{"localities":[{"name":"","bhkRange":"","avgPsqft":0,"yoy":0,"metro":"","conn":"","count":"","featured":false}],
"properties":[{"name":"","dev":"","location":"","price":"","sqft":"","bhk":"","status":"","ready_to_move":false,"lm":""}],
"adjacentLocalities":[{"name":"","delta":0,"label":"","metro":"","summary":""}],
"landmarks":{"primary":{"metro":"","hospital":"","school":"","mall":""},"secondary":{"metro":"","hospital":"","school":"","mall":""}}}
Return 5 localities, 6 properties, 4 adjacent. Realistic for ${city}, India.`;
  const r = await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.openAIKey},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:prompt}],temperature:0.7,max_tokens:1800})});
  const j = await r.json();
  return JSON.parse(j.choices[0].message.content.trim().replace(/^```json?\n?/,'').replace(/\n?```$/,''));
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPage() {
  const page = document.getElementById('page');
  const loc = config.location||{};
  const stage = config.stage||1;
  const primary = loc.primary||'';
  const secondary = loc.secondary||'';
  const city = loc.city||primary;
  const f = config.filters||{};
  const bhk = (f.bhk && f.bhk.length) ? f.bhk.join(', ') : '2 BHK';
  const budget = f.budgetMax ? '₹'+f.budgetMin+'L–₹'+f.budgetMax+'L' : '';
  const rtmLabel = f.readyToMove === 'yes' ? 'Ready to move' : f.readyToMove === 'no' ? 'Under construction' : '';

  // Nav
  const navLabel = primary
    ? (secondary && secondary !== primary ? primary + ' · ' + secondary : primary)
    : 'Search City/Locality...';
  document.getElementById('nav-search-text').textContent = navLabel;

  // Sticky CTA
  if (!primary) { page.innerHTML = renderEmpty(); return; }
  if (loading) { page.innerHTML = renderLoading(); return; }

  const mods = [];
  // ── Always ──────────────────────────────────────────────────────────────────
  mods.push(modContextChips(stage, primary, secondary, bhk, budget, rtmLabel));
  mods.push(modHero(stage, city, primary, secondary));

  // ── S2-S3: resume + nudges ──────────────────────────────────────────────────
  mods.push(modContinue(stage, primary, secondary));           // suppressed S4, S5
  mods.push(modStaleLocationNudge(stage, secondary, config.lastVisitDaysAgo));

  // ── S2: discovery + preferences ─────────────────────────────────────────────
  mods.push(modConsiderationSet(stage));                       // moved to S2 (was S3)
  mods.push(modLocalitySuggestions(stage, primary, secondary));
  mods.push(modLocalitiesRadar(stage, city, primary));

  // ── S1 only ─────────────────────────────────────────────────────────────────
  mods.push(modBudgetAnchor(stage, primary));

  // ── S1-S3: personalised budget context ──────────────────────────────────────
  mods.push(modBudgetFit(stage, f, primary));                  // S1: city-level; S2: locality fit; S3: comparative

  // ── S3: comparison suite ─────────────────────────────────────────────────────
  mods.push(modPropertiesInSecondary(stage, secondary));
  mods.push(modHeadToHead(stage, primary, secondary));         // guarded: requires secondary
  mods.push(modNearestLandmarks(stage, primary, secondary));   // guarded: requires secondary
  mods.push(modUpcomingDevelopments(stage, primary));          // moved before Tradeoff — inform before deciding
  mods.push(modTradeoff(stage, primary, secondary));
  mods.push(modExpertAgents(stage, primary, secondary));       // moved after Tradeoff — natural handoff

  // ── S2-S3: properties ────────────────────────────────────────────────────────
  mods.push(modPropertiesPrimary(stage, primary, secondary));
  mods.push(modSimilarBHK(stage, bhk, primary));               // deduped against PropertiesPrimary
  mods.push(modNewInSectors(stage, primary));                  // "New Launches in {primary}"
  mods.push(modNearbyLocalities(stage, primary));
  mods.push(modNearbyComparison(stage, primary));

  // ── S4-S5: decision + post-visit ─────────────────────────────────────────────
  mods.push(modDecisionSpotlight(stage, primary));
  mods.push(modStillConsidering(stage, primary));              // extended to S5 with post-visit framing
  mods.push(modVisitPlanner(stage));
  mods.push(modPostVisitTools(stage));

  // ── S1 only: new launches entry point ────────────────────────────────────────
  mods.push(modNewLaunches(stage, primary));                   // S2-S3 suppressed: NewInSectors covers it

  // ── S1+: recommendations + signals ──────────────────────────────────────────
  mods.push(modPeopleAlsoViewed(stage, primary));              // social proof at every stage
  mods.push(modPriceTrend(stage, primary));                    // appreciation signal at every stage

  // ── Utilities + footer ───────────────────────────────────────────────────────
  mods.push(modTools(stage));
  mods.push(modArticles(stage, primary, secondary));
  mods.push(modQuickLinks());
  mods.push(modHelpful());
  page.innerHTML = mods.filter(Boolean).join('');
}

// ── Modules ───────────────────────────────────────────────────────────────────

function modContextChips(stage, primary, secondary, bhk, budget, rtmLabel) {
  if (stage === 1) return null;
  const chips = [];
  if (stage >= 2 && primary) chips.push(`<div class="ds-chip ds-chip-sm active">${esc(primary)}${bhk?' · '+esc(bhk):''}${budget?' · '+esc(budget):''}<span class="ds-chip-dismiss"><span class="material-icons" style="font-size:14px;">close</span></span></div>`);
  if (secondary) chips.push(`<div class="ds-chip ds-chip-sm active">${esc(secondary)} · ${esc(bhk)}<span class="ds-chip-dismiss"><span class="material-icons" style="font-size:14px;">close</span></span></div>`);
  if (rtmLabel) chips.push(`<div class="ds-chip ds-chip-sm">${esc(rtmLabel)}</div>`);
  if (!chips.length) return null;
  return `<div class="context-chips">${chips.join('')}</div>`;
}

function modHero(stage, city, primary, secondary) {
  if (stage === 1) {
    return `<div class="hero-s1">
      <h1 class="ds-page-heading">Find your home in ${esc(city||primary)}</h1>
      <p class="ds-heading-sub" style="margin-top:8px;">Browse verified listings · Compare localities · Connect with sellers</p>
    </div>`;
  }
  return null;
}

function noteHtml(key, stage) {
  const val = propNotes[key] || '';
  const showDisplay = val && stage >= 4;
  return `<div class="prop-note-wrap">
    ${showDisplay ? `<div class="prop-note-display">📝 "${esc(val)}"</div>` : ''}
    <textarea class="prop-note-input" data-propkey="${esc(key)}" placeholder="Add a note...">${esc(val)}</textarea>
  </div>`;
}

function reactionHtml(key, notePlaceholder) {
  const passed = propChips[key] === 'pass';
  const note = propNotes[key] || '';
  const ph = notePlaceholder || 'Any concerns? Ask about parking, floor, etc.';
  return `${note ? `<div class="prop-note-display" style="margin-top:6px;">📝 "${esc(note)}"</div>` : ''}
  <textarea class="prop-note-input hidden" data-propkey="${esc(key)}" placeholder="${esc(ph)}">${esc(note)}</textarea>
  <div class="card-actions" style="display:flex;gap:6px;margin-top:8px;">
    <button class="ds-btn ds-btn-xs ds-btn-tertiary card-act${passed?' active':''}" data-rkey="${esc(key)}" data-rlabel="pass">${passed?'✕ Removed':'✕ Not for me'}</button>
    <button class="ds-btn ds-btn-xs ds-btn-secondary card-act" data-notetoggle="${esc(key)}">✏️ Add a note</button>
  </div>`;
}

function modContinue(stage, primary, secondary) {
  if (stage < 2 || stage === 4 || stage === 5) return null;
  const props = data.properties.slice(0, 2);
  const isS3 = stage === 3;

  const lastDays = config.lastVisitDaysAgo;
  const cards = props.length ? props.map((p, i) => {
    const viewedLabel = i === 0 ? (stage >= 3 ? 'Viewed 3 times' : 'Viewed 2 days ago') : (stage >= 3 ? 'Viewed 1 time' : 'Viewed 2 days ago');
    const isMostViewed = stage >= 3 && i === 0;
    const isSharedCard = i === 1 && stage >= 2; // P2: share signal on 2nd card
    const noteKey = p.name || ('prop_cont_' + i);
    return `<div class="ds-prop-card horizontal">
      <div class="ds-prop-card-img">
        ${propImg(p)}
        <div class="ds-prop-card-badges" style="right:44px;">
          ${isMostViewed ? `<span class="ds-image-tag" style="background:var(--amber);">MOST VIEWED</span>` : ''}
          <span class="ds-image-tag">${esc(viewedLabel)}</span>
          ${isSharedCard ? `<span class="ds-image-tag">📤 Shared</span>` : ''}
        </div>
        <button class="ds-shortlist ds-prop-card-shortlist"><span class="material-icons">favorite_border</span></button>
        <div class="ds-prop-card-possession">
          <span>${p.ready_to_move?'Ready to move':'Under Construction'}</span>
        </div>
      </div>
      <div class="ds-prop-card-body">
        <div class="ds-prop-card-price">${esc(p.price||'₹—')}</div>
        ${isMostViewed ? `<div style="font-size:10px;color:var(--red-heart);font-weight:700;margin-bottom:2px;">↓ ₹1L since you last viewed</div>` : ''}
        ${isMostViewed && lastDays ? `<div style="font-size:10px;color:var(--text-tertiary);margin-bottom:2px;">🔁 Last visited ${lastDays} day${lastDays>1?'s':''} ago</div>` : ''}
        ${isMostViewed && stage >= 3 ? `<div style="font-size:10px;color:var(--text-tertiary);margin-bottom:2px;">👨‍👩‍👧 Shared with 2 family members</div>` : ''}
        <div class="ds-prop-card-subtitle">${esc(p.bhk||'2 BHK')} · ${esc(p.dev||'')}</div>
        <div class="ds-prop-card-name" style="font-size:var(--text-sm);">${esc(p.location||primary)}</div>
        ${stage === 3 ? reactionHtml(noteKey) : stage === 4 ? noteHtml(noteKey, stage) : stage === 5 ? reactionHtml(noteKey, 'How did it compare to expectations?') : ''}
      </div>
    </div>`;
  }) : [skHprop(), skHprop()];

  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="sec-head"><div class="sec-title">Continue Where You Left Off</div><div class="sec-link">See all →</div></div>
      <div class="sec-sub">Your recent searches in ${esc(primary)}${secondary?' and '+esc(secondary):''}</div>
    </div>
    <div class="hscroll">${cards.join('')}</div>
  </div>`;
}

function modNewInSectors(stage, primary) {
  if (stage < 2 || stage > 3) return null;
  const f = config.filters || {};
  const selectedBhk = f.bhk && f.bhk.length ? f.bhk : null;
  const pool = rawData.properties || data.properties;

  // Filter: prefer properties matching BHK preference; if none match, fall back to unfiltered
  let newProps = pool.filter(p => !p.ready_to_move);
  if (selectedBhk) {
    const nums = selectedBhk.map(b => b.replace(/\D/g, ''));
    const bhkFiltered = newProps.filter(p => nums.indexOf((p.bhk||'').replace(/\D/g,'').charAt(0)) !== -1);
    if (bhkFiltered.length) newProps = bhkFiltered;
  }
  newProps = newProps.slice(0, 3);
  if (!newProps.length) return null;

  const bhkLabel = selectedBhk ? selectedBhk.join(', ') : '';
  const budget = f.budgetMax ? `₹${f.budgetMin}L–₹${f.budgetMax}L` : '';
  const sub = [bhkLabel, budget].filter(Boolean).join(' · ');

  const cards = newProps.map(p => `<div class="ds-prop-card horizontal">
    <div class="ds-prop-card-img">
      ${propImg(p)}
      <div class="ds-prop-card-badges"><span class="ds-image-tag blue">NEW</span></div>
      <button class="ds-shortlist ds-prop-card-shortlist"><span class="material-icons">favorite_border</span></button>
      <div class="ds-prop-card-possession"><span>New Launch</span></div>
    </div>
    <div class="ds-prop-card-body">
      <div class="ds-prop-card-price">${esc(p.price)}</div>
      <div class="ds-prop-card-subtitle">${esc(p.bhk)} · ${esc(p.dev||'')}</div>
      <div class="ds-prop-card-name" style="font-size:var(--text-sm);">${esc(p.location||primary)}</div>
      ${p.lm?`<div class="ds-prop-card-tags"><span class="ds-prop-card-tag">📍 ${esc(p.lm)}</span></div>`:''}
    </div>
  </div>`).join('');
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="sec-head"><div class="sec-title">New in ${esc(primary)}</div><div class="sec-link">See all →</div></div>
      ${sub ? `<div class="sec-sub">Matching your search · ${esc(sub)}</div>` : ''}
    </div>
    <div class="hscroll">${cards}</div>
  </div>`;
}

function modStaleLocationNudge(stage, secondary, lastDays) {
  if (stage < 2 || stage > 3) return null;
  if (!secondary || !lastDays || lastDays < 2) return null;
  const timeLabel = lastDays >= 7 ? `${Math.round(lastDays/7)} week${lastDays>=14?'s':''} ago` : `${lastDays} days ago`;
  return `<div class="sec sec-pad">
    <div class="ds-insight sm" style="margin-bottom:12px;">
      <div class="ds-insight-head">
        <div class="ds-insight-title-row">
          <span class="ds-insight-icon">🔁</span>
          <div class="ds-insight-title">You were looking in ${esc(secondary)} ${timeLabel}</div>
        </div>
      </div>
      <div class="ds-insight-sub">Still want recommendations for that area?</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="ds-btn ds-btn-sm ds-btn-primary">Yes, keep showing</button>
      <button class="ds-btn ds-btn-sm ds-btn-tertiary">No</button>
    </div>
  </div>`;
}

function modLocalitySuggestions(stage, primary, secondary) {
  if (stage < 2 || stage > 3) return null;
  if (secondary) return null; // buyer has narrowed to two — H2H handles it
  const fallback = getMockData(config);
  const allLocs = data.localities.length ? data.localities : fallback.localities;
  // Filter out the primary locality itself so we only show alternatives
  const locs = allLocs.filter(l => l.name.toLowerCase().trim() !== primary.toLowerCase().trim()).slice(0, 4);
  if (!locs.length) return null;
  const cards = locs.map(l => `<div class="loc-suggest-card">
    <div class="lsc-name">${esc(l.name)}</div>
    <div class="lsc-range">${esc(l.bhkRange||'')}</div>
    <div class="lsc-row"><span>📈 ${l.yoy||'—'}% YoY</span><span>🚇 ${esc(l.metro||'—')}</span></div>
    <div class="lsc-row"><span>₹${(l.avgPsqft||'—').toLocaleString()}/sqft</span><span>${esc(l.conn||'')}</span></div>
    <div class="lsc-footer">View ${esc(l.count||'properties')} →</div>
  </div>`).join('');
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="sec-head"><div class="ds-section-heading sec-title">Localities that match your search</div><div class="sec-link">All localities →</div></div>
      <div class="ds-heading-sub sec-sub">Based on budget and preferences in ${esc(primary)}</div>
    </div>
    <div class="hscroll" style="padding-bottom:12px;">${cards}</div>
    <div style="padding:6px 14px 0;">
      <div class="ds-subsection-heading">What matters most in your daily life?</div>
      <div class="ds-heading-sub">We'll prioritise localities that match</div>
    </div>
    <div class="pref-row">
      <div class="ds-chip ds-chip-sm active">🚇 Metro</div>
      <div class="ds-chip ds-chip-sm">🏥 Hospital</div>
      <div class="ds-chip ds-chip-sm">🏫 School</div>
      <div class="ds-chip ds-chip-sm">🛒 Marketplace</div>
      <div class="ds-chip ds-chip-sm"><span class="material-icons" style="font-size:14px;">add</span> Add landmark</div>
    </div>
    <div class="divider" style="margin:4px 0 0;"></div>
  </div>`;
}

function modLocalitiesRadar(stage, city, primary) {
  if (stage >= 3) return null;
  // At S2 without a secondary locality, modLocalitySuggestions handles discovery
  if (stage >= 2 && !(config.location && config.location.secondary)) return null;
  const fallback = getMockData(config);
  const locs = data.localities.length ? data.localities.slice(0,5) : fallback.localities.slice(0,5);
  const cards = locs.map(l => `<div class="loc-card">
    <div class="loc-card-name">${esc(l.name)}</div>
    <div class="loc-card-range">${esc(l.bhkRange||'')}</div>
    <div class="loc-card-stat"><span class="loc-stat-l">₹/sqft</span><span class="loc-stat-r">₹${l.avgPsqft||'—'}</span></div>
    <div class="loc-card-stat"><span class="loc-stat-l">Price growth</span><span class="loc-stat-r up">+${l.yoy||'—'}% YoY</span></div>
    <div class="loc-card-stat"><span class="loc-stat-l">Metro</span><span class="loc-stat-r">${esc(l.metro||'—')}</span></div>
    <div class="loc-card-footer" style="cursor:pointer;">${esc(l.count||'')} · View →</div>
  </div>`).join('');
  const _f1 = config.filters || {};
  const _budgetLabel = _f1.budgetMax ? `₹${_f1.budgetMin}L–₹${_f1.budgetMax}L` : '';
  const _bhkLabel = (_f1.bhk && _f1.bhk.length) ? _f1.bhk.join(', ') : '';
  const title = stage === 1
    ? (_budgetLabel ? `Where your budget works in ${esc(city||primary)}` : `Trending in ${esc(city||primary)}`)
    : 'Localities on your radar';
  const sub = stage === 1
    ? [_bhkLabel, _budgetLabel].filter(Boolean).join(' · ') || `Most searched localities in ${esc(city||primary)}`
    : `Most viewed near ${esc(primary)}`;
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="sec-head"><div class="sec-title">${title}</div><div class="sec-link">All localities →</div></div>
      <div class="sec-sub">${sub}</div>
    </div>
    <div class="hscroll">${cards}</div>
    ${stage >= 2 ? '<div class="divider" style="margin:4px 0 0;"></div>' : ''}
  </div>`;
}

function modConsiderationSet(stage) {
  if (stage !== 2) return null;
  const opts = [
    { label:'Ready to move properties only', sub:'Move in immediately, no waiting', sel:true },
    { label:'Open to Under Construction properties', sub:'Potentially 10-15% lower entry price', sel:false },

  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:4px;"><div class="ds-section-heading sec-title">What type of property are you open to?</div></div>
    ${opts.map(o=>`<div class="consid-option">

      <div><div class="consid-label">${o.label}</div><div class="consid-sub ds-heading-sub">${o.sub}</div></div>
    </div>`).join('')}
  </div>`;
}

function modPropertiesInSecondary(stage, secondary) {
  if (stage !== 3 || !secondary) return null;
  const f = config.filters||{};
  const budget = f.budgetMax ? '₹'+f.budgetMin+'L–₹'+f.budgetMax+'L' : '';
  const props = data.properties.slice(2, 4);
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="sec-head"><div class="sec-title">Properties in ${esc(secondary)}${budget?' · '+budget:''}</div><div class="sec-link">See all →</div></div>
    </div>
    <div class="hscroll">
      ${props.length ? props.map(p=>propCard(p, {showBadge:true, horizontal:true})).join('') : skCard()+skCard()}
    </div>
  </div>`;
}

function modHeadToHead(stage, primary, secondary) {
  if (stage !== 3) return null;
  if (!secondary) return null;
  const _fb = getMockData(config);
  const l1 = data.localities[0]||_fb.localities[0];
  const l2 = data.localities[1]||_fb.localities[1];
  const filt = config.filters || {};
  const cap = filt.budgetMax || 85;
  const sqft1 = Math.round(cap * 100000 / (l1.avgPsqft || 8000) / 10) * 10;
  const sqft2 = Math.round(cap * 100000 / (l2.avgPsqft || 7000) / 10) * 10;
  const worksNearLabel = (config.user && config.user.worksNear) ? 'Drive to '+config.user.worksNear : 'Drive to office';
  const rows = [
    { label: worksNearLabel, v1:'5 mins', v2:'20–25 mins', win:0 },
    { label:'Entry price / sqft', v1:'₹'+(l1.avgPsqft||8100), v2:'₹'+(l2.avgPsqft||6200), win: (l1.avgPsqft||8100) < (l2.avgPsqft||6200) ? 0 : 1 },
    { label:`Space for ₹${cap}L`, v1:'~'+sqft1+' sq ft', v2:'~'+sqft2+' sq ft', win: sqft1 >= sqft2 ? 0 : 1 },
    { label:'YoY appreciation', v1:'+'+( l1.yoy||12)+'%', v2:'+'+( l2.yoy||14)+'%', win: (l1.yoy||12) >= (l2.yoy||14) ? 0 : 1 },
    { label:'Who buys here', v1:'Owner-occupiers', v2:'Investors & end-users', win:0 },
    { label:'Development stage', v1:'Established', v2:'Mixed — verify', win:0 },
  ];
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:0;">
      <div class="sec-title">Head to Head</div>
      <div class="sec-sub" style="margin:2px 0 10px;">${esc(primary)} vs ${esc(secondary||'Nearby')}</div>
    </div>
    <div style="overflow:hidden;border-top:1px solid var(--border);">
      <table class="h2h-table">
        <thead class="h2h-head"><tr>
          <th></th>
          <th>${esc(primary)}</th>
          <th>${esc(secondary||'Nearby')}</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`<tr class="h2h-row"><td>${r.label}</td>
            <td>${r.win===0?`<span class="win">${esc(r.v1)}</span>`:esc(r.v1)}</td>
            <td>${r.win===1?`<span class="win">${esc(r.v2)}</span>`:esc(r.v2)}</td>
          </tr>`).join('')}
        </tbody>

function modBudgetFit(stage, f, primary) {
  if (stage > 3) return null;
  const min = f.budgetMin || 70, max = f.budgetMax || 95;
  const loc = data.localities[0] || getMockData(config).localities[0];
  if (!loc || !loc.avgPsqft) return null;
  const avgPsqft = loc.avgPsqft;
  const areaEntry = Math.round(avgPsqft * 900 / 100000);
  const sqftMin = Math.round(min * 100000 / avgPsqft / 10) * 10;
  const sqftMax = Math.round(max * 100000 / avgPsqft / 10) * 10;
  const adj = data.adjacentLocalities[0] || getMockData(config).adjacentLocalities[0];
  const secondary = (config.location || {}).secondary;
  const city = (config.location || {}).city || primary;
  const bhkLabel = (f.bhk && f.bhk.length) ? f.bhk.join(', ') : '2 BHK';

  // At S1 — city-level framing before buyer has chosen a locality
  if (stage === 1) {
    return `<div class="sec sec-pad">
      <div class="ds-insight" style="margin-bottom:12px;">
        <div class="ds-insight-head">
          <div class="ds-insight-title-row">
            <span class="ds-insight-icon">💰</span>
            <div class="ds-insight-title">What ₹${min}L–₹${max}L gets you in ${esc(city)}</div>
          </div>
        </div>
        <div class="ds-insight-sub">At ₹${avgPsqft.toLocaleString()}/sq ft, expect <b>~${sqftMin}–${sqftMax} sq ft</b> for a ${esc(bhkLabel)}.${adj ? ` Or consider <b>${esc(adj.name)}</b>, ${esc(adj.label)}.` : ''}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="ds-btn ds-btn-sm ds-btn-primary">Show matching properties</button>
        <button class="ds-btn ds-btn-sm ds-btn-tertiary">Adjust budget</button>
      </div>
    </div>`;
  }

  // At S3 (comparing two localities) — show a comparative budget framing
  if (stage === 3 && secondary) {
    const loc2 = data.localities[1] || getMockData(config).localities[1];
    if (loc2 && loc2.avgPsqft) {
      const sqft1 = Math.round(max * 100000 / avgPsqft / 10) * 10;
      const sqft2 = Math.round(max * 100000 / loc2.avgPsqft / 10) * 10;
      const bigger = sqft2 > sqft1 ? secondary : primary;
      const diff = Math.abs(sqft2 - sqft1);
      return `<div class="sec sec-pad">
        <div class="ds-insight" style="margin-bottom:12px;">
          <div class="ds-insight-head">
            <div class="ds-insight-title-row">
              <span class="ds-insight-icon">📐</span>
              <div class="ds-insight-title">Your ₹${max}L goes further in ${esc(bigger)}</div>
            </div>
          </div>
          <div class="ds-insight-sub">${esc(primary)}: ~${sqft1} sq ft · ${esc(secondary)}: ~${sqft2} sq ft<br>That's <b>${diff} sq ft more</b> for the same budget in ${esc(bigger)}.</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="ds-btn ds-btn-sm ds-btn-primary">See properties in ${esc(bigger)}</button>
          <button class="ds-btn ds-btn-sm ds-btn-tertiary">Compare both</button>
        </div>
      </div>`;
    }
  }

  // S2 — single locality framing
  let title, body, cta;
  if (max < areaEntry * 0.9) {
    title = `₹${max}L is tight for ${esc(primary)}`;
    body  = `Most 2 BHKs here start around ₹${areaEntry}L. ${adj ? `<b>${esc(adj.name)}</b> is ${esc(adj.label)} and may suit your budget better.` : 'Consider exploring nearby areas.'}`;
    cta   = adj ? `See properties in ${esc(adj.name)}` : 'Explore nearby areas';
  } else if (min > areaEntry * 1.4) {
    title = `Your budget unlocks premium options in ${esc(primary)}`;
    body  = `At ₹${min}L–₹${max}L, you can explore 3 BHKs (~${sqftMin}–${sqftMax} sq ft) or premium localities nearby.`;
    cta   = 'See 3 BHK options';
  } else {
    title = `Your ₹${min}L–₹${max}L works well here`;
    body  = `At ₹${avgPsqft.toLocaleString()}/sq ft, expect ~${sqftMin}–${sqftMax} sq ft — a solid 2 BHK in ${esc(primary)}.`;
    cta   = 'Show me these properties';
  }
  return `<div class="sec sec-pad">
    <div class="ds-insight" style="margin-bottom:12px;">
      <div class="ds-insight-head">
        <div class="ds-insight-title-row">
          <span class="ds-insight-icon">💰</span>
          <div class="ds-insight-title">${title}</div>
        </div>
      </div>
      <div class="ds-insight-sub">${body}</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="ds-btn ds-btn-sm ds-btn-primary">${cta}</button>
      <button class="ds-btn ds-btn-sm ds-btn-tertiary">Adjust budget</button>
    </div>
  </div>`;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Shortlist toggle — delegate from #page ────────────────────────────────────
document.getElementById('page').addEventListener('click', function(e) {
  const btn = e.target.closest('.ds-shortlist');
  if (btn) {
    btn.classList.toggle('saved');
    const icon = btn.querySelector('.material-icons');
    if (icon) icon.textContent = btn.classList.contains('saved') ? 'favorite' : 'favorite_border';
  }
});

// ── Sticky notes — delegate from #page ────────────────────────────────────────
document.getElementById('page').addEventListener('input', function(e) {
  const ta = e.target.closest('.prop-note-input');
  if (ta) {
    const key = ta.dataset.propkey;
    propNotes[key] = ta.value;
    // Update note display in both prop-note-wrap and card-chips-wrap contexts
    const wrap = ta.closest('.prop-note-wrap') || ta.closest('.card-chips-wrap');
    if (wrap) {
      let disp = wrap.querySelector('.prop-note-display');
      if (ta.value) {
        if (!disp) {
          disp = document.createElement('div');
          disp.className = 'prop-note-display';
          wrap.insertBefore(disp, wrap.firstChild);
        }
        disp.textContent = '📝 "' + ta.value + '"';
      } else if (disp) {
        disp.remove();
      }
    }
  }
});

// ── Per-card actions — delegate from #page ────────────────────────────────────
document.getElementById('page').addEventListener('click', function(e) {
  // "Not for me" toggle
  const passBtn = e.target.closest('[data-rlabel="pass"]');
  if (passBtn) {
    const key = passBtn.dataset.rkey;
    propChips[key] = propChips[key] === 'pass' ? '' : 'pass';
    const active = propChips[key] === 'pass';
    passBtn.className = 'ds-btn ds-btn-xs ds-btn-tertiary card-act' + (active ? ' active' : '');
    passBtn.textContent = active ? '✕ Removed' : '✕ Not for me';
    return;
  }
  // Note toggle
  const toggle = e.target.closest('[data-notetoggle]');
  if (toggle && toggle.classList.contains('card-act')) {
    const key = toggle.dataset.notetoggle;
    const wrap = toggle.closest('.card-actions');
    if (!wrap) return;
    const ta = wrap.previousElementSibling;
    if (ta && ta.classList.contains('prop-note-input')) {
      ta.classList.toggle('hidden');
      if (!ta.classList.contains('hidden')) ta.focus();
    }
    return;
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
var _supaUrl = (typeof window !== 'undefined' && window.SUPABASE_URL)  || '';
var _supaKey = (typeof window !== 'undefined' && window.SUPABASE_ANON_KEY) || '';
var _inIframe = window.parent && window.parent !== window;

if (!_inIframe && _supaUrl && _supaKey && window.supabase) {
  // ── Standalone mode: always subscribe to fixed 'default' room ────────────────
  var _lsb = window.supabase.createClient(_supaUrl, _supaKey);

  renderPage(); // show empty/loading state while waiting

  // 1. Fetch the latest config immediately on load
  _lsb.from('live_config').select('config').eq('room', 'default').single().then(function(res) {
    if (res.data && res.data.config) {
      _panelConnected = true;
      config = Object.assign(defaultConfig(), res.data.config);
      fetchAndRender();
    }
  });

  // 2. Subscribe — every panel change arrives here in ~1 second
  _lsb.channel('live:default')
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'live_config',
      filter: 'room=eq.default'
    }, function(payload) {
      if (payload.new && payload.new.config) {
        _panelConnected = true;
        config = Object.assign(defaultConfig(), payload.new.config);
        fetchAndRender();
      }
    })
    .subscribe();

} else {
  // ── Iframe mode: connected to panel via postMessage ──────────────────────────
  renderPage();
  if (_inIframe) {
    function _signalReady() {
      if (_panelConnected) return;
      window.parent.postMessage({ type: 'HOMEPAGE_READY' }, '*');
    }
    _signalReady();
    var _readyTimer = setInterval(function() {
      if (_panelConnected) { clearInterval(_readyTimer); return; }
      _signalReady();
    }, 300);
    setTimeout(function() { clearInterval(_readyTimer); }, 8000);
  }
}
