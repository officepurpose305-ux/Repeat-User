<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>99acres · Research Sessions</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #2B3BE5;
      --blue-lt: #5B6EFA;
      --dark:    #0F1117;
      --dark2:   #1A1D2E;
      --dark3:   #22273A;
      --dark4:   #2C3150;
      --border:  rgba(255,255,255,0.07);
      --text:    rgba(255,255,255,0.88);
      --text2:   rgba(255,255,255,0.45);
      --text3:   rgba(255,255,255,0.22);
      --green:   #1DB97C;
      --amber:   #F5A623;
      --red:     #E53E3E;
      --r:       10px;
      --r-sm:    6px;
    }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Page header ─────────────────────────── */
    .page-header {
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .page-title { font-size: 18px; font-weight: 700; }
    .page-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .header-actions { display: flex; align-items: center; gap: 10px; }

    .db-status {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text2);
      background: var(--dark3); border-radius: 20px;
      padding: 6px 14px; border: 1px solid var(--border);
    }
    .db-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
    .db-dot.connected { background: var(--green); }
    .db-dot.error     { background: var(--red); }

    .btn {
      padding: 8px 16px; border-radius: 20px;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; border: none;
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none;
    }
    .btn-primary  { background: var(--blue); color: #fff; }
    .btn-ghost    { background: var(--dark3); color: var(--text); border: 1px solid var(--border); }
    .btn:hover    { opacity: 0.85; }

    /* ── Filter bar ───────────────────────────── */
    .filter-bar {
      padding: 16px 32px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--dark2);
    }
    .filter-bar select, .filter-bar input {
      background: var(--dark3); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 7px 12px;
      font-size: 12.5px; color: var(--text); outline: none;
      font-family: inherit; cursor: pointer;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: var(--blue-lt); }
    .filter-bar select option { background: var(--dark2); }
    .count-badge {
      margin-left: auto; font-size: 12px; color: var(--text2);
      background: var(--dark3); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }

    /* ── Sessions list ────────────────────────── */
    .sessions-wrap { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

    .session-card {
      background: var(--dark2); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 12px;
      overflow: hidden; transition: border-color 0.15s;
    }
    .session-card:hover { border-color: rgba(255,255,255,0.15); }
    .session-card.expanded { border-color: var(--blue); }

    .sc-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; cursor: pointer;
    }
    .sc-stage {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--blue); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .sc-stage.s1 { background: #8E44AD; }
    .sc-stage.s2 { background: var(--blue); }
    .sc-stage.s3 { background: #1B7F4F; }
    .sc-stage.s4 { background: #D35400; }
    .sc-stage.s5 { background: var(--red); }

    .sc-info { flex: 1; min-width: 0; }
    .sc-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .sc-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }

    .sc-tags { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .sc-tag {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: var(--dark3); border: 1px solid var(--border); color: var(--text2);
    }
    .sc-tag.has-obs { background: rgba(29,185,124,0.12); color: var(--green); border-color: rgba(29,185,124,0.3); }
    .sc-tag.has-sum { background: rgba(43,59,229,0.15); color: #8B99FF; border-color: rgba(43,59,229,0.3); }

    .sc-chevron {
      font-size: 12px; color: var(--text3); transition: transform 0.2s;
      flex-shrink: 0; margin-left: 4px;
    }
    .session-card.expanded .sc-chevron { transform: rotate(90deg); }

    /* Expandable body */
    .sc-body { display: none; border-top: 1px solid var(--border); }
    .session-card.expanded .sc-body { display: block; }

    .sc-body-inner {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .sc-col {
      padding: 18px 20px;
    }
    .sc-col:first-child { border-right: 1px solid var(--border); }
    .sc-col-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text2); margin-bottom: 12px;
    }

    /* Config summary rows */
    .cfg-row {
      display: flex; justify-content: space-between;
      padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12.5px;
    }
    .cfg-row:last-child { border-bottom: none; }
    .cfg-lbl { color: var(--text2); }
    .cfg-val { color: var(--text); font-weight: 500; }

    /* Observations textarea */
    .obs-textarea {
      width: 100%; background: var(--dark3);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 12px; font-size: 13px;
      color: var(--text); font-family: inherit; resize: vertical;
      min-height: 100px; outline: none; transition: border-color 0.15s;
      line-height: 1.6; margin-bottom: 8px;
    }
    .obs-textarea:focus { border-color: var(--blue-lt); }
    .obs-textarea::placeholder { color: var(--text3); }

    /* Summary box */
    .summary-box {
      background: var(--dark3); border-radius: var(--r-sm);
      padding: 12px; font-size: 12px; color: var(--text);
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
      max-height: 200px; overflow-y: auto; border: 1px solid var(--border);
    }
    .summary-box::-webkit-scrollbar { width: 3px; }
    .summary-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    /* JSON viewer */
    .json-toggle {
      font-size: 11.5px; color: var(--blue-lt); cursor: pointer;
      margin-bottom: 8px; display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; padding: 0;
    }
    .json-box {
      background: var(--dark); border-radius: var(--r-sm);
      padding: 10px; font-size: 10.5px;
      color: rgba(100,220,160,0.8); font-family: 'SF Mono', 'Fira Mono', monospace;
      white-space: pre-wrap; word-break: break-word;
      max-height: 180px; overflow-y: auto; line-height: 1.5;
      border: 1px solid var(--border); display: none;
    }
    .json-box::-webkit-scrollbar { width: 3px; }
    .json-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    /* Action row */
    .sc-actions {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px;
      color: var(--text2);
    }
    .empty-state h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-state p  { font-size: 14px; line-height: 1.6; }

    /* Loading */
    .loading-state { text-align: center; padding: 60px; color: var(--text2); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--green); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      z-index: 9999; pointer-events: none;
      transition: transform 0.3s ease; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Page header -->
<div class="page-header">
  <div>
    <div class="page-title">Research Sessions</div>
    <div class="page-sub">99acres UX Research Tool · Session Archive</div>
  </div>
  <div class="header-actions">
    <div class="db-status">
      <div class="db-dot" id="db-dot"></div>
      <span id="db-label">Connecting…</span>
    </div>
    <button class="btn btn-ghost" onclick="loadSessions()">↺ Refresh</button>
    <a class="btn btn-primary" href="dashboard.html">Open Dashboard →</a>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <select id="filter-stage" onchange="applyFilters()">
    <option value="">All stages</option>
    <option value="1">Stage 1 · Discovery</option>
    <option value="2">Stage 2 · Locality Awareness</option>
    <option value="3">Stage 3 · Comparison</option>
    <option value="4">Stage 4 · Shortlist</option>
    <option value="5">Stage 5 · Post-Visit</option>
  </select>
  <input type="text" id="filter-search" placeholder="Search by name or location…" oninput="applyFilters()" style="width:220px"/>
  <select id="filter-sort" onchange="applyFilters()">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="stage">By stage</option>
  </select>
  <div class="count-badge" id="count-badge">0 sessions</div>
</div>

<!-- Sessions list -->
<div class="sessions-wrap" id="sessions-wrap">
  <div class="loading-state">Loading sessions…</div>
</div>

<!-- Toast -->
<div id="toast">Saved!</div>

<script>
/* ─── Supabase config ───────────────────────────────────── */
// These must match what you put in dashboard.html
const SUPABASE_URL = 'https://qlfttxrnnjueycffwdmy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mKFJhKV-3x5j62Md7zpWFQ_UctZ194l';

let sb = null;
let allSessions = [];

function setDbStatus(state, msg) {
  const dot = document.getElementById('db-dot');
  const lbl = document.getElementById('db-label');
  dot.className = 'db-dot' + (state === 'connected' ? ' connected' : state === 'error' ? ' error' : '');
  lbl.textContent = msg;
}

async function init() {
  if (!SUPABASE_URL || !SUPABASE_KEY) {
    setDbStatus('error', 'Not configured — add URL + key');
    document.getElementById('sessions-wrap').innerHTML = `
      <div class="empty-state">
        <h2>Supabase not configured</h2>
        <p>Open <strong>sessions.html</strong> and paste your<br>
        <code>SUPABASE_URL</code> and <code>SUPABASE_KEY</code> at the top of the script.<br><br>
        You'll find these in your Supabase project → Settings → API.</p>
      </div>`;
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await loadSessions();
}

async function loadSessions() {
  if (!sb) return;
  setDbStatus('connecting', 'Loading…');
  const { data, error } = await sb
    .from('sessions')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    setDbStatus('error', error.message);
    document.getElementById('sessions-wrap').innerHTML =
      `<div class="empty-state"><h2>Error loading sessions</h2><p>${error.message}</p></div>`;
    return;
  }
  setDbStatus('connected', `Supabase connected · ${data.length} sessions`);
  allSessions = data || [];
  applyFilters();
}

function applyFilters() {
  const stage  = document.getElementById('filter-stage').value;
  const search = document.getElementById('filter-search').value.toLowerCase();
  const sort   = document.getElementById('filter-sort').value;

  let filtered = allSessions.filter(s => {
    if (stage && String(s.stage) !== stage) return false;
    if (search) {
      const hay = `${s.name} ${s.config?.location?.primary || ''} ${s.config?.location?.city || ''} ${s.observations || ''}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  if (sort === 'oldest') filtered.reverse();
  else if (sort === 'stage') filtered.sort((a,b) => a.stage - b.stage);

  document.getElementById('count-badge').textContent = `${filtered.length} session${filtered.length !== 1 ? 's' : ''}`;
  renderSessions(filtered);
}

const STAGE_NAMES = {
  1: 'Discovery', 2: 'Locality Awareness', 3: 'Comparison',
  4: 'Shortlist · Decision', 5: 'Post-Visit'
};

function renderSessions(list) {
  const wrap = document.getElementById('sessions-wrap');
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state">
      <h2>No sessions found</h2>
      <p>Save sessions from the Dashboard to see them here.<br>Or adjust the filters above.</p>
    </div>`;
    return;
  }

  wrap.innerHTML = list.map((s, idx) => {
    const cfg = s.config || {};
    const loc = cfg.location || {};
    const filters = cfg.filters || {};
    const behavior = cfg.behavior || {};
    const date = new Date(s.updated_at).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });

    return `
    <div class="session-card" id="card-${s.id}">
      <div class="sc-header" onclick="toggleCard('${s.id}')">
        <div class="sc-stage s${s.stage}">${s.stage}</div>
        <div class="sc-info">
          <div class="sc-name">${s.name || 'Unnamed session'}</div>
          <div class="sc-meta">
            Stage ${s.stage} · ${STAGE_NAMES[s.stage] || '—'} &nbsp;·&nbsp;
            ${loc.primary || '—'}${loc.city ? ', ' + loc.city : ''} &nbsp;·&nbsp;
            ${date}
          </div>
        </div>
        <div class="sc-tags">
          ${s.observations ? '<span class="sc-tag has-obs">📝 Notes</span>' : ''}
          ${s.summary     ? '<span class="sc-tag has-sum">🤖 Summary</span>' : ''}
          <span class="sc-tag">
            ${filters.bhk ? filters.bhk.join(', ') : '—'}
          </span>
          <span class="sc-tag">
            ${filters.budgetMin ? '₹' + filters.budgetMin + 'L–₹' + filters.budgetMax + 'L' : '—'}
          </span>
        </div>
        <span class="sc-chevron">▶</span>
      </div>

      <div class="sc-body">
        <div class="sc-body-inner">

          <!-- Left col: config summary + JSON -->
          <div class="sc-col">
            <div class="sc-col-title">Session Config</div>
            <div class="cfg-row"><span class="cfg-lbl">Participant</span><span class="cfg-val">${cfg.user?.name || '—'}, ${cfg.user?.age || '—'}, ${cfg.user?.occupation || '—'}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Stage</span><span class="cfg-val">${s.stage} — ${STAGE_NAMES[s.stage]}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Primary location</span><span class="cfg-val">${loc.primary || '—'}, ${loc.city || '—'}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Secondary</span><span class="cfg-val">${loc.secondary || '—'}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Budget</span><span class="cfg-val">₹${filters.budgetMin || '—'}L – ₹${filters.budgetMax || '—'}L</span></div>
            <div class="cfg-row"><span class="cfg-lbl">BHK</span><span class="cfg-val">${(filters.bhk || []).join(', ') || '—'}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Property views</span><span class="cfg-val">${behavior.viewCount || '—'} times</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Contacted developer</span><span class="cfg-val">${behavior.contactedDeveloper ? 'Yes' : 'No'}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Visited site</span><span class="cfg-val">${behavior.visitedSite ? 'Yes' : 'No'}</span></div>
            <div class="cfg-row"><span class="cfg-lbl">Price sensitivity</span><span class="cfg-val">${behavior.priceSensitivity || '—'}</span></div>
            <div style="margin-top:12px">
              <button class="json-toggle" onclick="toggleJSON('${s.id}')">▶ Raw config JSON</button>
              <div class="json-box" id="json-${s.id}">${JSON.stringify(cfg, null, 2)}</div>
            </div>
          </div>

          <!-- Right col: observations + summary -->
          <div class="sc-col">
            <div class="sc-col-title">Researcher Observations</div>
            <textarea
              class="obs-textarea"
              id="obs-${s.id}"
              placeholder="Add your observations about this session…"
              onblur="saveObs('${s.id}')"
            >${s.observations || ''}</textarea>
            <button class="btn btn-ghost" style="font-size:11.5px;padding:6px 14px" onclick="saveObs('${s.id}')">💾 Save note</button>

            ${s.summary ? `
            <div class="sc-col-title" style="margin-top:18px">AI Summary</div>
            <div class="summary-box">${s.summary}</div>` : `
            <div style="margin-top:18px;font-size:12px;color:var(--text3)">No AI summary yet — use "End Session" in the dashboard to generate one.</div>`}
          </div>
        </div>

        <div class="sc-actions">
          <a class="btn btn-primary" href="dashboard.html?session=${s.id}">Load in Dashboard →</a>
          <button class="btn btn-ghost" onclick="confirmDelete('${s.id}')">Delete session</button>
          <span style="margin-left:auto;font-size:11px;color:var(--text3)">ID: ${s.id}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ─── Card interactions ───────────────────────────────────── */
function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  card.classList.toggle('expanded');
}

function toggleJSON(id) {
  const box = document.getElementById(`json-${id}`);
  const btn = box.previousElementSibling;
  const showing = box.style.display === 'block';
  box.style.display = showing ? 'none' : 'block';
  btn.textContent = (showing ? '▶' : '▼') + ' Raw config JSON';
}

async function saveObs(id) {
  if (!sb) { showToast('Supabase not configured'); return; }
  const text = document.getElementById(`obs-${id}`).value;
  const { error } = await sb.from('sessions').update({
    observations: text,
    updated_at: new Date().toISOString(),
  }).eq('id', id);

  if (error) { showToast('Save failed'); console.error(error); return; }

  // Update local copy
  const s = allSessions.find(x => x.id === id);
  if (s) s.observations = text;
  showToast('Observation saved!');
}

async function confirmDelete(id) {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  if (!sb) return;
  const { error } = await sb.from('sessions').delete().eq('id', id);
  if (error) { showToast('Delete failed'); return; }
  allSessions = allSessions.filter(s => s.id !== id);
  applyFilters();
  showToast('Session deleted');
}

/* ─── Toast ───────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ─── Boot ────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
