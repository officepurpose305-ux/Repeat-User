<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>99acres — Homepage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2B3BE5;
      --blue-lt:    #EEF2FF;
      --blue-mid:   #6370F0;
      --bg:         #F0F0F5;
      --white:      #FFFFFF;
      --t1:         #111111;
      --t2:         #555555;
      --t3:         #999999;
      --gold:       #F5A623;
      --green:      #1B7F4F;
      --green-lt:   #E6F7F0;
      --red:        #D93025;
      --red-lt:     #FEE8E6;
      --r-card:     14px;
      --r-pill:     50px;
      --shadow:     0 1px 5px rgba(0,0,0,0.08);
      --shadow-md:  0 3px 14px rgba(0,0,0,0.11);
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    }

    /* ── Standalone (direct browser open) ─────────── */
    body:not(.in-iframe) {
      background: #D8D8E0;
      min-height: 100vh;
    }

    /* Dev mode switcher bar */
    .dev-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: #16162A;
      display: none; /* shown only in ?dev=1 */
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      overflow-x: auto;
    }
    .dev-bar::-webkit-scrollbar { display: none; }
    .dev-bar label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-right: 4px; white-space: nowrap; flex-shrink: 0;
    }
    .s-btn {
      flex-shrink: 0;
      padding: 6px 13px; border-radius: 20px;
      font-size: 11.5px; font-weight: 600;
      color: rgba(255,255,255,0.45);
      border: 1.5px solid rgba(255,255,255,0.12);
      background: transparent; cursor: pointer;
      white-space: nowrap; transition: all 0.15s;
    }
    .s-btn.on { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── Phone shell (standalone only) ─────────────── */
    .frame-wrap {
      display: flex;
      justify-content: center;
      padding: 24px 0 32px;
      min-height: 100vh;
    }
    body.dev-mode .frame-wrap { padding-top: 56px; }
    body.in-iframe .frame-wrap { padding: 0; display: block; }

    .phone {
      width: 360px;
      background: var(--bg);
      border-radius: 38px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.12);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    body.in-iframe .phone {
      width: 100%; border-radius: 0; box-shadow: none;
      min-height: 100vh;
    }

    /* LIVE badge */
    #live-badge {
      position: fixed;
      top: 8px; right: 10px;
      background: var(--green);
      color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      display: none;
      align-items: center; gap: 4px;
      z-index: 300;
      letter-spacing: 0.3px;
    }
    #live-badge.on { display: flex; }

    .statusbar {
      background: var(--white);
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px 6px;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scroll::-webkit-scrollbar { display: none; }

    /* ── Header ──────────────────────────────── */
    .hdr {
      background: var(--white);
      padding: 6px 12px 8px;
      display: flex; align-items: center; gap: 8px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 0 #EBEBEB;
    }
    .ico-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: #F3F3F3; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .srch {
      flex: 1; background: #F0F0F0;
      border-radius: var(--r-pill);
      display: flex; align-items: center;
      padding: 8px 12px; gap: 7px;
    }
    .srch-txt { color: var(--t3); font-size: 13px; flex: 1; }

    /* Chips row */
    .chips {
      background: var(--white);
      padding: 0 12px 9px;
      display: flex; gap: 6px;
      border-bottom: 1px solid #EBEBEB;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: var(--r-pill);
      font-size: 11.5px; font-weight: 500;
      background: var(--blue-lt); color: var(--blue);
      border: 1px solid #BCC4FB;
    }
    .chip .x { opacity: 0.6; font-size: 10px; margin-left: 1px; }

    /* ── Sections ────────────────────────────── */
    .sec {
      background: var(--white);
      margin-top: 8px;
      padding: 16px 16px 18px;
    }
    .sec-title { font-size: 17px; font-weight: 700; color: var(--t1); margin-bottom: 3px; }
    .sec-sub { font-size: 12px; color: var(--t3); margin-bottom: 12px; }

    .div8 { height: 8px; background: var(--bg); }

    .hscroll {
      display: flex; gap: 10px;
      overflow-x: auto; padding-bottom: 3px;
      -webkit-overflow-scrolling: touch;
    }
    .hscroll::-webkit-scrollbar { display: none; }

    /* ── HERO (Stage 1) ──────────────────────── */
    .hero-s1 {
      background: linear-gradient(160deg, #1A1F6B 0%, #2B3BE5 55%, #5B6EFA 100%);
      padding: 28px 18px 24px;
      position: relative; overflow: hidden;
    }
    .hero-s1::after {
      content: ''; position: absolute;
      bottom: -30px; right: -30px;
      width: 160px; height: 160px;
      border-radius: 50%; background: rgba(255,255,255,0.06);
    }
    .hero-s1 .city { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 4px; }
    .hero-s1 h1 { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.25; margin-bottom: 16px; }
    .hero-srch {
      background: var(--white); border-radius: var(--r-pill);
      display: flex; align-items: center;
      padding: 10px 14px; gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .hero-srch span { font-size: 13.5px; color: var(--t3); flex: 1; }
    .hero-stats { display: flex; gap: 16px; margin-top: 16px; }
    .hstat { text-align: center; }
    .hstat-val { font-size: 18px; font-weight: 800; color: #fff; }
    .hstat-lbl { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 1px; }

    /* ── Trending locality pills ─────────────── */
    .trend-pill {
      flex-shrink: 0; padding: 8px 14px; border-radius: var(--r-pill);
      background: var(--white); border: 1px solid #E0E0E0;
      font-size: 12.5px; font-weight: 500; color: var(--t1);
      white-space: nowrap; display: flex; align-items: center; gap: 5px;
    }
    .trend-pill .pill-stat { color: var(--green); font-weight: 700; font-size: 11px; }

    /* ── Compact property cards ──────────────── */
    .pcard {
      flex-shrink: 0; width: 190px;
      border-radius: var(--r-card); background: var(--white);
      border: 1px solid #E8E8E8; box-shadow: var(--shadow); overflow: hidden;
    }
    .pcard-img-wrap { position: relative; height: 115px; overflow: hidden; }
    .pcard-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pcard-badges {
      position: absolute; top: 7px; left: 7px; right: 7px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .rera {
      background: rgba(0,0,0,0.52); color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 3px 7px; border-radius: 20px;
      display: flex; align-items: center; gap: 3px;
    }
    .hrt {
      width: 26px; height: 26px;
      background: rgba(255,255,255,0.92); border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer;
    }
    .pcard-bottom-badge {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px 8px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
    }
    .badge-pill {
      display: inline-flex; align-items: center;
      padding: 2px 7px; border-radius: 20px;
      font-size: 9px; font-weight: 700;
    }
    .badge-new  { background: var(--blue); color: #fff; }
    .badge-drop { background: var(--green); color: #fff; }
    .badge-seen { background: rgba(0,0,0,0.55); color: #fff; }
    .pcard-body { padding: 9px 10px 10px; }
    .pcard-name { font-size: 12.5px; font-weight: 700; color: var(--t1); line-height: 1.3; }
    .pcard-loc  { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .pcard-price { font-size: 13px; font-weight: 700; color: var(--t1); margin-top: 6px; }
    .pcard-per  { font-size: 10.5px; color: var(--t3); }

    /* ── Full-width property card (shortlist) ── */
    .pcard-full {
      border-radius: var(--r-card); background: var(--white);
      border: 1px solid #E8E8E8; box-shadow: var(--shadow);
      overflow: hidden; margin-bottom: 10px;
    }
    .pcard-full-img-wrap { position: relative; height: 140px; overflow: hidden; }
    .pcard-full-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .pcard-full-body { padding: 10px 12px 12px; }
    .pcard-full-name { font-size: 14px; font-weight: 700; }
    .pcard-full-row { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
    .star-row { display: flex; align-items: center; gap: 3px; font-size: 12px; color: var(--t2); }
    .star { color: var(--gold); font-size: 12px; }
    .pcard-full-meta { font-size: 12px; color: var(--t2); margin-top: 2px; }
    .pcard-full-loc  { font-size: 12.5px; font-weight: 600; color: var(--t1); margin-top: 4px; }
    .pricebox {
      background: #F7F7F7; border-radius: 10px;
      padding: 9px 10px; margin-top: 9px;
    }
    .pricebox-bhk   { font-size: 12px; font-weight: 600; }
    .pricebox-sqft  { font-size: 11px; color: var(--t3); }
    .pricebox-price { font-size: 16px; font-weight: 700; margin-top: 3px; }
    .pricebox-per   { font-size: 11px; color: var(--t3); }

    /* ── Locality cards ──────────────────────── */
    .lcard {
      flex-shrink: 0; min-width: 140px;
      border-radius: var(--r-card); background: var(--white);
      border: 1px solid #E8E8E8; box-shadow: var(--shadow); overflow: hidden;
    }
    .lcard-color { height: 8px; }
    .lcard-body { padding: 10px 12px 12px; }
    .lcard-name { font-size: 13px; font-weight: 700; }
    .lcard-city { font-size: 11px; color: var(--t3); margin-bottom: 8px; }
    .lcard-stat {
      display: flex; justify-content: space-between;
      font-size: 11.5px; color: var(--t2); padding: 4px 0;
    }
    .lcard-stat strong { color: var(--t1); font-weight: 600; }
    .lcard-tag {
      display: inline-block; margin-top: 8px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
    }

    /* ── Comparison table ────────────────────── */
    .ctable { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ctable th { padding: 9px 8px; background: #F7F7F7; font-weight: 700; text-align: left; }
    .ctable th:first-child { color: var(--t2); font-weight: 500; }
    .ctable td { padding: 9px 8px; border-bottom: 1px solid #F2F2F2; color: var(--t1); }
    .ctable td:first-child { color: var(--t2); font-size: 11px; }
    .win { color: var(--green); font-weight: 700; }

    /* ── Preference pills ────────────────────── */
    .prefs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .pref {
      padding: 6px 13px; border-radius: var(--r-pill);
      border: 1.5px solid #E0E0E0; font-size: 12px; font-weight: 500;
      color: var(--t2); cursor: pointer; background: var(--white);
    }
    .pref.on { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }

    /* ── Nearby locality items ───────────────── */
    .nearby-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid #F5F5F5;
    }
    .nearby-item:last-child { border-bottom: none; }
    .nearby-dot {
      width: 36px; height: 36px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .nearby-info { flex: 1; }
    .nearby-name { font-size: 13px; font-weight: 600; color: var(--t1); }
    .nearby-sub  { font-size: 11px; color: var(--t3); margin-top: 1px; }
    .nearby-right { text-align: right; }
    .nearby-price { font-size: 12px; font-weight: 700; color: var(--t1); }
    .nearby-delta { font-size: 11px; color: var(--green); font-weight: 600; }

    /* ── Social proof banner ─────────────────── */
    .sproof {
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 12px;
    }
    .sproof p { font-size: 12.5px; line-height: 1.4; }
    .sproof-amber { background: #FFF8E7; border: 1px solid #FFE082; }
    .sproof-amber p { color: #795500; }
    .sproof-blue  { background: var(--blue-lt); border: 1px solid #BCC4FB; }
    .sproof-blue p { color: var(--blue); }
    .sproof-green { background: var(--green-lt); border: 1px solid #A8DFC5; }
    .sproof-green p { color: var(--green); }

    /* ── Budget nudge ────────────────────────── */
    .b-nudge {
      background: var(--blue-lt); border: 1px solid #BCC4FB;
      border-radius: 12px; padding: 12px 14px;
    }
    .b-nudge-q { font-size: 13px; color: var(--blue); font-weight: 500; margin-bottom: 10px; }
    .b-choices { display: flex; flex-direction: column; gap: 6px; }
    .b-choice {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      background: var(--white); border: 1.5px solid #DDDDF8; cursor: pointer;
    }
    .b-choice.on { border-color: var(--blue); }
    .b-radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #CCC; flex-shrink: 0; }
    .b-radio.on { border-color: var(--blue); background: var(--blue); box-shadow: inset 0 0 0 3px #fff; }
    .b-choice-txt { font-size: 13px; font-weight: 500; color: var(--t1); }

    /* ── New launch card ─────────────────────── */
    .nlcard {
      border-radius: var(--r-card); border: 1px solid #E8E8E8;
      box-shadow: var(--shadow); overflow: hidden; background: var(--white);
    }
    .nlcard-hdr {
      text-align: center; padding: 7px; background: #FAFAF5;
      font-size: 11.5px; color: var(--t2); letter-spacing: 0.5px;
      border-bottom: 1px solid #F0F0E8;
    }
    .nlcard-body { display: flex; gap: 10px; padding: 12px; }
    .nlcard-thumb { width: 68px; height: 68px; border-radius: 10px; flex-shrink: 0; overflow: hidden; }
    .nlcard-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .nlcard-info { flex: 1; }
    .nlcard-name  { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .nlcard-loc   { font-size: 11px; color: var(--t2); margin-top: 1px; }
    .nlcard-price { font-size: 13px; font-weight: 700; margin-top: 5px; }
    .nlcard-det   { font-size: 11px; color: var(--t2); }
    .nlcard-footer { padding: 0 12px 12px; display: flex; justify-content: space-between; align-items: center; }
    .zero-brok { font-size: 11px; color: var(--t2); display: flex; align-items: center; gap: 4px; }

    /* ── Tools ───────────────────────────────── */
    .tool-chip {
      flex-shrink: 0; padding: 8px 14px; border-radius: var(--r-pill);
      border: 1.5px solid #E0E0E0; font-size: 12px; font-weight: 500;
      color: var(--t1); background: var(--white); white-space: nowrap; cursor: pointer;
    }

    /* ── Articles ────────────────────────────── */
    .acard {
      flex-shrink: 0; min-width: 215px;
      border-radius: 12px; border: 1px solid #E8E8E8;
      box-shadow: var(--shadow); padding: 10px;
      display: flex; gap: 10px; background: var(--white);
    }
    .athumb { width: 68px; height: 68px; border-radius: 9px; flex-shrink: 0; object-fit: cover; }
    .ainfo { flex: 1; }
    .atitle { font-size: 12.5px; font-weight: 600; color: var(--t1); line-height: 1.4; }
    .adate  { font-size: 11px; color: var(--t3); margin-top: 4px; }

    /* ── Decision Spotlight (Stage 4) ────────── */
    .spotlight { margin: 8px 0 0; background: var(--white); }
    .spot-alert {
      background: linear-gradient(90deg, #E6F7F0, #F0FBF6);
      border-bottom: 1px solid #A8DFC5;
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
    }
    .spot-alert p { font-size: 12px; color: var(--green); font-weight: 500; }
    .spot-label {
      background: linear-gradient(90deg, var(--blue) 0%, #5B6EFA 100%);
      padding: 9px 16px; font-size: 11px; font-weight: 800;
      color: rgba(255,255,255,0.85); letter-spacing: 1.2px;
      display: flex; align-items: center; gap: 8px;
    }
    .spot-img-wrap { position: relative; height: 185px; overflow: hidden; }
    .spot-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .spot-img-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 30px 12px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .spot-drop { background: var(--green); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .spot-hrt  { width: 32px; height: 32px; background: rgba(255,255,255,0.9); border-radius: 50%; border: none; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .spot-body { padding: 12px 14px; }
    .spot-name { font-size: 18px; font-weight: 800; color: var(--t1); }
    .spot-loc  { font-size: 13px; color: var(--t2); margin-top: 2px; }
    .spot-signals {
      display: grid; grid-template-columns: repeat(4,1fr);
      border-top: 1px solid #F0F0F0; border-bottom: 1px solid #F0F0F0;
      margin: 12px 0;
    }
    .sig { text-align: center; padding: 10px 4px; border-right: 1px solid #F0F0F0; }
    .sig:last-child { border-right: none; }
    .sig-val { font-size: 17px; font-weight: 800; color: var(--t1); }
    .sig-val.g { color: var(--green); }
    .sig-val.r { color: var(--red); }
    .sig-lbl { font-size: 9.5px; color: var(--t3); margin-top: 2px; }
    .spot-price { font-size: 22px; font-weight: 800; }
    .spot-price-sub { font-size: 12px; color: var(--t3); margin-top: 2px; }
    .spot-price-old { text-decoration: line-through; color: var(--t3); font-size: 14px; margin-left: 6px; font-weight: 400; }
    .spot-ctas { display: flex; gap: 8px; margin-top: 14px; }

    /* ── Stage 5 social proof ────────────────── */
    .s5-header {
      background: linear-gradient(135deg, #1A1F6B 0%, #2B3BE5 100%);
      padding: 20px 16px 22px;
    }
    .s5-you-viewed {
      background: rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 14px;
    }
    .s5-yv-label { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .s5-yv-count { font-size: 38px; font-weight: 900; color: #fff; line-height: 1; }
    .s5-yv-sub   { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .s5-signals  { display: flex; gap: 8px; }
    .s5-sig {
      flex: 1; background: rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 8px; text-align: center;
    }
    .s5-sig-val { font-size: 16px; font-weight: 800; color: #fff; }
    .s5-sig-lbl { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; }

    /* ── Shortlist items ─────────────────────── */
    .sl-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid #F5F5F5;
    }
    .sl-item:last-child { border-bottom: none; }
    .sl-thumb { width: 52px; height: 52px; border-radius: 9px; flex-shrink: 0; overflow: hidden; }
    .sl-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .sl-info { flex: 1; min-width: 0; }
    .sl-name  { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sl-loc   { font-size: 11px; color: var(--t3); }
    .sl-price { font-size: 12.5px; font-weight: 700; margin-top: 2px; }
    .yn-row { display: flex; gap: 4px; flex-shrink: 0; }
    .yn { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1.5px solid; cursor: pointer; }
    .yn-y { color: var(--green); border-color: var(--green); background: var(--green-lt); }

<script>
/* ─── Static image assets ──────────────────────────────── */
const IMGS = [
  'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=400&h=220&fit=crop&auto=format',
  'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=400&h=220&fit=crop&auto=format',

  'https://images.unsplash.com/photo-1576941089067-2de3c901e126?w=400&h=220&fit=crop&auto=format',

const ARTICLE_IMGS = [
  'https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?w=150&h=150&fit=crop&auto=format',

];

/* ─── Default data ─────────────────────────────────────── */
const DEFAULT_PROPS = [
  { id:0, name:'Godrej Evergreens', loc:'Sector 137, Noida', rating:4.2, rev:38, meta:'2, 3 BHK', bhk:'2 BHK', sqft:'1,085 sq.ft.', price:'₹84.5L', per:'₹7,786/sqft', status:'Ready To Move', isNew:false, isDrop:true, isSeen:false, img:IMGS[0] },
  { id:1, name:'Prestige High Fields', loc:'Sector 137, Noida', rating:3.8, rev:22, meta:'2, 3, 4 BHK', bhk:'2 BHK', sqft:'1,120 sq.ft.', price:'₹91.5L', per:'₹8,169/sqft', status:'Ready To Move', isNew:true, isDrop:false, isSeen:true, img:IMGS[1] },
  { id:2, name:'ATS Tourmaline', loc:'Sector 109, Noida', rating:4.0, rev:15, meta:'2, 3 BHK', bhk:'2 BHK', sqft:'1,050 sq.ft.', price:'₹79.5L', per:'₹7,571/sqft', status:'Under Construction', isNew:false, isDrop:false, isSeen:false, img:IMGS[2] },

const DEFAULT_LOC = {

  adjacent:  { name:'Sector 128', avg:'₹7,200', yoy:'+21%', metro:'1.5km', type:'Gated', rtm:'High', color:'#1B7F4F' },
};

/* ─── Session state (driven by researcher or defaults) ──── */
let CONFIG = {
  stage: 2,
  user: { name: 'Priya Mehta', age: 32, occupation: 'Product Manager' },
  location: {
    primary: 'Sector 137',
    secondary: 'Sector 143',
    city: 'Noida',
  },
  filters: { budgetMin: 75, budgetMax: 95, bhk: ['2BHK'] },

};

/* ─── 99acres API: live listings (entities + search-urls + listings) ─── */
const API_BASE = window.NINETY_NINE_ACRES_API_BASE || 'http://10.10.17.143:5003';
const FALLBACK_IMGS = IMGS;

function mapAPIPropertiesRoot(data) {
  let items = [];
  if (Array.isArray(data)) items = data;
  else if (data?.results) items = data.results;
  else if (data?.properties) items = data.properties;
  else if (data?.listings) items = data.listings;
  else if (data?.data && Array.isArray(data.data)) items = data.data;
  const { location, filters } = CONFIG;
  return items.slice(0, 8).map((p, i) => {
    const price = p.price || p.min_price || p.listed_price;
    const priceStr = typeof price === 'number' ? `₹${(price / 100000).toFixed(1)}L` : (p.price_str || `₹${(filters.budgetMin || 75) + Math.floor(Math.random() * ((filters.budgetMax || 95) - (filters.budgetMin || 75)))}L`);
    const sqftNum = p.area || p.carpet_area || p.built_up_area || (900 + Math.floor(Math.random() * 400));
    const perSqft = price && sqftNum ? Math.round((price * 100) / sqftNum) : (7000 + Math.floor(Math.random() * 2000));
    const img = p.image_url || p.photo_url || p.thumbnail || p.cover_photo || p.image || p.img || (p.images && p.images[0]) || FALLBACK_IMGS[i % FALLBACK_IMGS.length];
    return {
      id: p.id || p.property_id || p.listing_id || i,
      name: p.name || p.project_name || p.title || `Project ${i + 1}`,
      loc: p.location || p.locality_name || p.address || `${location.primary}, ${location.city}`,
      rating: parseFloat((p.rating || p.review_score || (3.5 + Math.random())).toFixed(1)),
      rev: parseInt(p.review_count || p.num_reviews || (10 + Math.floor(Math.random() * 40)), 10),
      meta: p.bhk_types || p.configuration || `${p.bedroom || 2} BHK`,
      bhk: `${p.bedroom || 2} BHK`,
      sqft: `${sqftNum.toLocaleString()} sq.ft.`,
      price: priceStr,
      per: `₹${perSqft.toLocaleString()}/sqft`,
      status: p.status || p.possession_status || (p.ready_to_move ? 'Ready To Move' : 'Under Construction'),
      isNew: !!(p.is_new_launch || p.new_launch || p.is_new),
      isDrop: !!(p.price_drop || p.is_price_drop),
      isSeen: false,
      img,
    };
  });
}

async function fetchLivePropertiesFrom99acres() {
  const { location, filters } = CONFIG;
  const bhkNum = (filters.bhk && filters.bhk[0] ? filters.bhk[0] : '2BHK').replace(/BHK|\\+/g, '').trim() || '2';
  const rtm = filters.readyToMove === 'yes' ? ' ready to move' : '';
  const query = `${bhkNum} BHK${rtm} flat for sale in ${location.primary} ${location.city}`.trim();
  try {
    const entRes = await fetch(`${API_BASE}/debug/entities?query=${encodeURIComponent(query)}`);
    if (!entRes.ok) return;
    const entities = await entRes.json();
    const entitiesStr = JSON.stringify(entities);
    await fetch(`${API_BASE}/debug/search-urls?entities=${encodeURIComponent(entitiesStr)}`).catch(() => {});
    const endpoints = [
      `/search?entities=${encodeURIComponent(entitiesStr)}&limit=8`,
      `/listings?entities=${encodeURIComponent(entitiesStr)}&limit=8`,
      `/api/properties?city=${entities.city || ''}&locality=${entities.locality || ''}&bedroom=${entities.bedroom || bhkNum}&limit=8`,
    ];
    for (const ep of endpoints) {
      try {
        const r = await fetch(`${API_BASE}${ep}`);
        if (r.ok) {
          const d = await r.json();
          const mapped = mapAPIPropertiesRoot(d);
          if (mapped.length > 0) {
            CONFIG.properties = mapped;
            return;
          }
        }
      } catch (_) {}
    }
  } catch (_) {}
}

/* ─── Helpers ──────────────────────────────────────────── */
const $ = id => document.getElementById(id);

function svg_shield() {
  return `<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M5 1L6.2 3.6L9 4L7 6L7.5 9L5 7.6L2.5 9L3 6L1 4L3.8 3.6L5 1Z" fill="white"/></svg>`;
}

function chip(txt) {
  return `<div class="chip">${txt} <span class="x">✕</span></div>`;
}

/* Compact property card */
function pcard(p) {
  const badge = p.isDrop ? `<span class="badge-pill badge-drop">↓ Price drop</span>`
    : p.isNew ? `<span class="badge-pill badge-new">NEW</span>`
    : p.isSeen ? `<span class="badge-pill badge-seen">Seen</span>` : '';
  return `
    <div class="pcard">
      <div class="pcard-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#8395A7,#5C7A8A)'">
        <div class="pcard-badges">
          <div class="rera">${svg_shield()}RERA</div>
          <button class="hrt">♡</button>
        </div>
        ${badge ? `<div class="pcard-bottom-badge">${badge}</div>` : ''}
      </div>
      <div class="pcard-body">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-loc">${p.loc}</div>
        <div class="pcard-price">${p.price}</div>
        <div class="pcard-per">${p.per} · ${p.bhk}</div>
      </div>
    </div>`;
}

/* Locality card */
function lcard(loc, size) {
  if (!loc) return '';
  return `
    <div class="lcard" style="min-width:${size||140}px">
      <div class="lcard-color" style="background:${loc.color}"></div>
      <div class="lcard-body">
        <div class="lcard-name">${loc.name}</div>
        <div class="lcard-city">${CONFIG.location.city}</div>
        <div class="lcard-stat"><span>Avg price</span><strong>${loc.avg}/sqft</strong></div>

        <div class="lcard-stat"><span>Metro</span><strong>${loc.metro}</strong></div>

/* Article card */
function acard(title, date, imgIdx) {

/* ─── Main render ───────────────────────────────────────── */
function go(n) {
  CONFIG.stage = n;
  document.querySelectorAll('.s-btn').forEach((b,i) => b.classList.toggle('on', i === n-1));
  render();
}

function render() {
  const { stage, location, behavior, properties, loc } = CONFIG;
  const chips_el = $('chips');
  const srch = $('srch-txt');

  // Search bar & chips
  if (stage === 1) {
    chips_el.style.display = 'none';
    srch.textContent = 'Search City / Locality…';
  } else if (stage === 2) {
    chips_el.style.display = 'flex';
    chips_el.innerHTML = chip(`Buy in ${location.city}`) + chip(`${location.primary} · 2BHK`);
    srch.textContent = `Buy in ${location.city} · ${location.primary}`;
  } else if (stage >= 3) {
    chips_el.style.display = 'flex';
    chips_el.innerHTML = chip(`${location.primary} · Under ₹${CONFIG.filters.budgetMax}L`) + chip(`${location.secondary} · 2BHK`);
    srch.textContent = `${location.primary} · ${location.secondary} · 2BHK`;
  }

  const fns = { 1: s1, 2: s2, 3: s3, 4: s4, 5: s5 };
  $('content').innerHTML = (fns[stage] || s2)();

  // interactive pill clicks
  $('content').querySelectorAll('[data-group]').forEach(el => {
    el.addEventListener('click', function() {
      const g = this.dataset.group;
      document.querySelectorAll(`[data-group="${g}"]`).forEach(x => x.classList.remove('on'));
      this.classList.add('on');
    });
  });
  $('content').scrollTop = 0;
}

      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #F2F2F2">

/* ─── Init: detect context ──────────────────────────── */
(function init() {
  const params = new URLSearchParams(window.location.search);
  const isIframe = window !== window.parent;
  const isDev = params.get('dev') === '1';

  // iframe mode: strip phone shell chrome
  if (isIframe) {
    document.body.classList.add('in-iframe');
  }

  // dev mode: show switcher
  if (isDev || (!isIframe && !params.has('session'))) {
    document.body.classList.add('dev-mode');
    const bar = $('dev-bar');
    bar.style.display = 'flex';
    // update switcher to match initial stage
    document.querySelectorAll('.s-btn').forEach((b,i) => b.classList.toggle('on', i === CONFIG.stage-1));
  }

  // update clock every minute
  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const el = $('status-time');
    if (el) el.textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 60000);

  // initial render, then load live 99acres listings and re-render
  render();
  fetchLivePropertiesFrom99acres().then(() => render());
})();

/* ─── postMessage handler (from researcher dashboard) ── */
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'CONFIG_UPDATE') return;

  const incoming = e.data.config;
  if (!incoming) return;

  // Merge incoming config
  if (incoming.stage)    CONFIG.stage = incoming.stage;
  if (incoming.user)     CONFIG.user = { ...CONFIG.user, ...incoming.user };
  if (incoming.location) CONFIG.location = { ...CONFIG.location, ...incoming.location };
  if (incoming.filters)  CONFIG.filters = { ...CONFIG.filters, ...incoming.filters };
  if (incoming.behavior) CONFIG.behavior = { ...CONFIG.behavior, ...incoming.behavior };
  if (incoming.properties && incoming.properties.length > 0) {
    CONFIG.properties = incoming.properties;
  } else {
    fetchLivePropertiesFrom99acres().then(() => render());
  }

  // If researcher sent locality data, update it
  if (incoming.loc) {
    CONFIG.loc = { ...CONFIG.loc, ...incoming.loc };
  }

  // Show LIVE badge
  const badge = $('live-badge');
  badge.classList.add('on');

  // Update dev switcher if visible
  document.querySelectorAll('.s-btn').forEach((b,i) => b.classList.toggle('on', i === CONFIG.stage-1));

  if (incoming.properties && incoming.properties.length > 0) render();
  // else: render() is called after fetchLivePropertiesFrom99acres() resolves

  // Acknowledge to parent
  try {
    e.source.postMessage({ type: 'ACK', stage: CONFIG.stage }, '*');
  } catch(_) {}
});
</script>
