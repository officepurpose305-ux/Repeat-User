<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>99acres Homepage Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #111;
      font-size: 14px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 12px;
      color: #2563eb;
    }
    p {
      font-size: 12px;
      color: #666;
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #111;
    }
    input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      padding: 10px 14px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-primary:active {
      opacity: 0.9;
      transform: scale(0.98);
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .btn-secondary:hover {
      background: #eeeeee;
    }
    .divider {
      height: 1px;
      background: rgba(0,0,0,0.08);
      margin: 12px 0;
    }
    .status {
      font-size: 12px;
      color: #666;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      margin-bottom: 12px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      background: #f0fdf4;
      color: #16a34a;
    }
  </style>
</head>
<body>
  <h1>99acres Generator</h1>
  <p>Auto-generate all 5 buyer stages with all modules</p>

  <div class="checkbox-group">
    <label>
      <input type="checkbox" id="stage1" checked>
      <span>Stage 1 — Discovery</span>
    </label>
    <label>
      <input type="checkbox" id="stage2" checked>
      <span>Stage 2 — Locality Awareness</span>
    </label>
    <label>
      <input type="checkbox" id="stage3" checked>
      <span>Stage 3 — Comparison</span>
    </label>
    <label>
      <input type="checkbox" id="stage4" checked>
      <span>Stage 4 — Shortlist</span>
    </label>
    <label>
      <input type="checkbox" id="stage5" checked>
      <span>Stage 5 — Post-Visit</span>
    </label>
  </div>

  <div class="divider"></div>

  <div id="status" class="status"></div>

  <div class="button-group">
    <button class="btn-primary" id="generate">Generate Frames</button>
    <button class="btn-secondary" id="clear">Clear All</button>
  </div>

  <script>
    const generateBtn = document.getElementById('generate');
    const clearBtn = document.getElementById('clear');
    const statusEl = document.getElementById('status');

    function showStatus(message, type = 'info') {
      statusEl.textContent = message;
      statusEl.className = `status show ${type}`;
      setTimeout(() => {
        statusEl.classList.remove('show');
      }, 3000);
    }

    generateBtn.addEventListener('click', () => {
      const stages = [];
      if (document.getElementById('stage1').checked) stages.push(1);
      if (document.getElementById('stage2').checked) stages.push(2);
      if (document.getElementById('stage3').checked) stages.push(3);
      if (document.getElementById('stage4').checked) stages.push(4);
      if (document.getElementById('stage5').checked) stages.push(5);

      if (stages.length === 0) {
        showStatus('Select at least one stage', 'error');
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating...';

      parent.postMessage({
        pluginMessage: {
          type: 'GENERATE',
          stages: stages
        }
      }, '*');

      setTimeout(() => {
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate Frames';
        showStatus(`Generated ${stages.length} stage${stages.length > 1 ? 's' : ''}`, 'success');
      }, 1000);
    });

    clearBtn.addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: {
          type: 'CLEAR'
        }
      }, '*');
      showStatus('Cleared all frames', 'success');
    });
  </script>
</body>
</html>
