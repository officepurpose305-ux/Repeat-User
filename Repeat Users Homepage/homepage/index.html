// Generate smarter mock data based on city patterns instead of random slices
function generateIntelligentMockData(city, searchedLocality) {
  // Resolve city name to canonical key
  var cityCode = (city || '').toLowerCase().trim();
  var found = false;
  for (var alias in CITY_ALIASES) {
    if (cityCode.includes(alias)) {
      cityCode = CITY_ALIASES[alias];
      found = true;
      break;
    }
  }
  if (!found) cityCode = 'noida'; // fallback

  var cityData = MOCK_DATA[cityCode];
  if (!cityData) {
    console.log('[mock] City not found:', cityCode, '— using fallback');
    return MOCK_DATA.noida;
  }

  // Try to find the searched locality in the city's localities list
  var searchedLoc = null;
  if (searchedLocality) {
    var searchLower = searchedLocality.toLowerCase();
    for (var i = 0; i < cityData.localities.length; i++) {
      if (cityData.localities[i].name.toLowerCase().includes(searchLower) ||
          searchLower.includes(cityData.localities[i].name.toLowerCase())) {
        searchedLoc = cityData.localities[i];
        break;
      }
    }
  }

  if (!searchedLoc) {
    // Locality not found — return city sample with warning
    console.log('[mock] Locality not found:', searchedLocality, '— using city sample');
    return {
      properties: cityData.properties ? cityData.properties.slice(0, 8) : [],
      localities: cityData.localities ? cityData.localities.slice(0, 6) : [],
      adjacentLocalities: cityData.adjacentLocalities || [],
      landmarks: cityData.landmarks || {}
    };
  }

  // Locality found — generate intelligent mock
  console.log('[mock] Generating smart mock for:', searchedLoc.name);

  // Find nearby localities: same price tier or within ±30% of avgPsqft
  var nearbyLocalities = [];
  if (cityData.localities) {
    nearbyLocalities = cityData.localities
      .filter(function(l) {
        if (l.name === searchedLoc.name) return false;
        var priceDelta = Math.abs(l.avgPsqft - searchedLoc.avgPsqft) / searchedLoc.avgPsqft;
        return priceDelta < 0.3;
      })
      .sort(function(a, b) { return b.yoy - a.yoy; }) // prefer high YoY
      .slice(0, 5);
  }

  // Find properties in or near the searched locality
  var nearbyProperties = [];
  if (cityData.properties) {
    nearbyProperties = cityData.properties.filter(function(p) {
      // Match searched locality or nearby localities
      var matchesSearched = p.location.toLowerCase().includes(searchedLoc.name.toLowerCase());
      var matchesNearby = nearbyLocalities.some(function(nl) {
        return p.location.toLowerCase().includes(nl.name.toLowerCase());
      });
      return matchesSearched || matchesNearby;
    });

    // If we found properties near the locality, use them; otherwise use city sample
    if (nearbyProperties.length === 0) {
      nearbyProperties = cityData.properties.slice(0, 8);
    } else {
      nearbyProperties = nearbyProperties.slice(0, 8);
    }
  }

  // Build result with searched locality first, then nearby
  var allLocalities = [searchedLoc].concat(nearbyLocalities);

  console.log('[mock] Generated with', nearbyProperties.length, 'properties from', searchedLoc.name, '+ nearby');

  return {
    properties: nearbyProperties,
    localities: allLocalities.slice(0, 6),
    adjacentLocalities: cityData.adjacentLocalities || [],
    landmarks: cityData.landmarks || {}
  };
}

async function fetchAndRender() {
  var loc = config.location || {};
  var fetchKey = (loc.primary || '') + '|' + (loc.secondary || '') + '|' + (loc.city || '');

  // Filter-only change (BHK / budget / RTM / timeline) — location unchanged.
  // Skip the full API/OpenAI/mock pipeline and just re-apply filters on cached rawData.
  if (_lastFetchKey === fetchKey && rawData && (rawData.properties || []).length) {
    data = applyFilters(rawData, config);
    renderPage();
    return;
  }

  _lastFetchKey = fetchKey;
  var myId = ++_fetchId;   // guard: if a newer fetch starts, this one becomes stale
  loading = true; renderPage();
  var fetched = await fetchData(config);
  console.log('[fetchAndRender] fetchData returned:', {
    propertiesCount: (fetched.properties || []).length,
    hasImageUrls: (fetched.properties || []).some(p => p.image_url),
    firstPropImageUrl: (fetched.properties || []).length > 0 ? (fetched.properties[0].image_url || '(empty)') : 'N/A'
  });
  if (myId !== _fetchId) return; // superseded — discard result
  rawData = fetched;
  console.log('[fetchAndRender] rawData now has', (rawData.properties || []).length, 'properties');
  data = applyFilters(rawData, config);
  console.log('[fetchAndRender] after applyFilters, data has', (data.properties || []).length, 'properties');
  loading = false; renderPage();
}

// Fetch with hard timeout — prevents hanging on unreachable internal API servers
function fetchWithTimeout(url, ms) {
  ms = ms || 5000;
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms);
  return fetch(url, { signal: ctrl.signal }).finally(function() { clearTimeout(timer); });
}

// Parse the scraped text format returned by /debug/search-urls
// Each listing block has: Landing URL, Listing Title, Listing Image URL, Listing Description, Posted by, Possession Status
function parseApiListings(text, fallbackLoc) {
  console.log('[parseApiListings] Input text length:', text.length);
  const results = [];
  const blocks = text.split(/\n{2,}(?=Landing URL:)/);
  console.log('[parseApiListings] Split into', blocks.length, 'blocks');
  for (var i = 0; i < blocks.length; i++) {
    var block = blocks[i];
    var get = function(field) {
      var m = block.match(new RegExp('^' + field + ':\\s*(.+)$', 'm'));
      return m ? m[1].trim() : '';
    };
    var title  = get('Listing Title');
    if (!title) {
      console.log('[parseApiListings] Block', i, 'has no title, skipping');
      continue;
    }
    console.log('[parseApiListings] Block', i, 'title:', title.substring(0, 50));
    var desc   = get('Listing Description');
    var imgUrl = get('Listing Image URL');
    var poss   = get('Possession Status');

    var bhkM   = title.match(/(\d)\s*BHK/i);
    var bhk    = bhkM ? bhkM[1] + ' BHK' : '2 BHK';
    var nameM  = title.match(/^(.+?)\s+\d\s*BHK/i);
    var name   = nameM ? nameM[1].trim() : title;
    var locM   = title.match(/\bin\s+(.+)$/i);
    var loc    = locM ? locM[1].trim() : fallbackLoc;

    // Price: grab first ₹ amount, strip deposit/month suffix
    var priceM = desc.match(/₹[\d,]+(?:\.\d+)?(?:\s*(?:Cr|L))?(?:\s*\/month)?/);
    var price  = priceM ? priceM[0].replace(/\s*\/month/, '').trim() : '₹—';

    var sqftM  = desc.match(/([\d,]+)\s*sqft/i);
    var sqft   = sqftM ? sqftM[1].replace(/,/g, '') + ' sq ft' : '';

    var nearbyM = desc.match(/Nearby\s*:\s*(.+?)(?:\s+\+\d|$)/i);
    var lm      = nearbyM ? nearbyM[1].trim() : '';

    var rtm = /ready to move/i.test(desc) || /ready to move/i.test(poss);
    results.push({
      name, location: loc, price, sqft, bhk,
      ready_to_move: rtm,
      status: rtm ? 'Ready to move' : (poss || 'Under Construction'),
      lm, image_url: imgUrl
    });
  }
  var filtered = results.filter(function(r) { return r.name; });
  console.log('[parseApiListings] Returning', filtered.length, 'results:', filtered.map(function(r) { return r.name; }));
  return filtered;
}

// Apply RTM and BHK filters to any data result — runs on every data path
// so filter changes take effect immediately without re-fetching
// Parse a price string like "₹88L", "₹1.1 Cr", "₹79.5L" → value in Lakhs, or null
function parsePriceLakhs(priceStr) {
  if (!priceStr || priceStr === '₹—') return null;
  var s = priceStr.replace(/[₹,\s]/g, '');
  var crMatch = s.match(/^([\d.]+)[Cc]r$/);
  if (crMatch) return parseFloat(crMatch[1]) * 100;
  var lMatch = s.match(/^([\d.]+)[Ll]$/);
  if (lMatch) return parseFloat(lMatch[1]);
  return null;
}

function applyFilters(result, cfg) {
  var f = cfg.filters || {};
  var props = (result.properties || []).slice();

  // RTM filter — strict: respect the user's selection exactly
  if (f.readyToMove === 'yes') {
    props = props.filter(function(p) { return p.ready_to_move; });
  } else if (f.readyToMove === 'no') {
    props = props.filter(function(p) { return !p.ready_to_move; });
  }

  // BHK filter — keep any property matching one of the selected BHKs
  if (f.bhk && f.bhk.length) {
    var selectedNums = f.bhk.map(function(b) { return b.replace(/\D/g, ''); });
    var filtered = props.filter(function(p) {
      // Handle both string and array bhk formats
      var bhkStr = Array.isArray(p.bhk) ? p.bhk.join(', ') : (p.bhk || '');
      var pNum = bhkStr.replace(/\D/g, '').charAt(0);
      return selectedNums.indexOf(pNum) !== -1;
    });
    // Only apply if results remain — avoids blanking the page on stale cached data
    if (filtered.length > 0) props = filtered;
  }

  // Budget filter — only apply when both min and max are valid (> 0)
  if ((f.budgetMin || 0) > 0 && (f.budgetMax || 0) > 0) {
    props = props.filter(function(p) {
      var val = parsePriceLakhs(p.price);
      if (val === null) return true; // keep if unparseable
      return val >= f.budgetMin && val <= f.budgetMax;
    });
  }

  // Enrich lm field with dynamic commute calculation if worksNear is set
  var worksNear = cfg.user && cfg.user.worksNear;
  if (worksNear) {
    props = props.map(function(p) {
      var commute = estimateCommute(p.location, worksNear);
      var commuteStr = commute ? commute + ' mins to ' + worksNear : null;
      var newLm = commuteStr ? commuteStr : p.lm;
      return Object.assign({}, p, { lm: newLm });
    });
  }

  return Object.assign({}, result, { properties: props });
}

// ── Core Scoring Functions ──────────────────────────────────────────────────
// Used by modules to rank localities and properties intelligently
// All functions return 0–100 score

function scoreProximity(targetLocalityName, candidateLocalityName, city) {
  // Score based on geographic distance (km)
  // Distance curve: 0-2km=100, 2-5km=75, 5-10km=50, 10-15km=25, 15+=10

  // For now, use locality name similarity as proxy (can enhance with real distance data)
  var targetNum = parseInt(targetLocalityName.match(/\d+/) || '0');
  var candidateNum = parseInt(candidateLocalityName.match(/\d+/) || '0');

  if (!targetNum || !candidateNum) return 50; // fallback for non-numbered localities

  var distance = Math.abs(targetNum - candidateNum) * 1.2; // rough proxy: each sector ~1.2km apart

  if (distance <= 2) return 100;
  if (distance <= 5) return 75;
  if (distance <= 10) return 50;
  if (distance <= 15) return 25;
  return 10;
}

function scorePriceTier(budgetMinL, budgetMaxL, localityAvgPsqft) {
  // Match locality price to user's budget
  // Assumes 1000 sqft average property
  if (!budgetMinL || !budgetMaxL) return 50; // no budget filter

  var midpointL = (budgetMinL + budgetMaxL) / 2;
  var estimatedPrice = (localityAvgPsqft * 1000) / 10000000; // estimate for 1000 sqft in crores, simplified to lakhs/100
  var deltaPercent = Math.abs(estimatedPrice - midpointL) / midpointL;

  if (deltaPercent <= 0.1) return 100;
  if (deltaPercent <= 0.2) return 85;
  if (deltaPercent <= 0.3) return 70;
  if (deltaPercent <= 0.5) return 40;
  return 0;
}

function scoreCommute(locality, userWorkLocation) {
  // Score based on work location commute viability
  // Returns 100 if on path + within tolerance, 20 if off path, 30 if way over

  if (!userWorkLocation) return 50; // neutral if no work location provided

  // Check if locality is on typical commute route
  var isOnPath = false;
  if (userWorkLocation.toLowerCase().includes('cyber city') || userWorkLocation.toLowerCase().includes('gurgaon')) {
    // Gurgaon work hub: prefer Gurgaon, nearby Noida, avoid far locations
    isOnPath = locality.conn && (locality.conn.includes('Expressway') || locality.conn.includes('NH'));
  }

  // Metro distance as proxy for commute viability
  var metroDistKm = 2; // default assumption
  if (locality.metro && locality.metro.match(/(\d+(?:\.\d+)?)\s*km/)) {
    metroDistKm = parseFloat(locality.metro.match(/(\d+(?:\.\d+)?)/)[1]);
  }

  if (metroDistKm <= 1) return 100;
  if (metroDistKm <= 2) return 85;
  if (metroDistKm <= 3) return 70;
  return 40;
}

function scoreLocality(targetLocality, candidateLocality, cfg) {
  // Composite score: 30% proximity + 25% price + 20% commute + 15% appreciation + 10% infrastructure
  // Combines all factors into single 0–100 score for ranking

  var weights = { proximity: 0.30, price: 0.25, commute: 0.20, yoy: 0.15, infra: 0.10 };

  var scores = {
    proximity: scoreProximity(targetLocality.name, candidateLocality.name, cfg.location.city),
    price: scorePriceTier((cfg.filters || {}).budgetMin || 80, (cfg.filters || {}).budgetMax || 120, candidateLocality.avgPsqft),
    commute: scoreCommute(candidateLocality, (cfg.user || {}).worksNear),
    yoy: candidateLocality.yoy > 14 ? 90 : (candidateLocality.yoy > 10 ? 70 : 50),
    infra: 50 // placeholder; enhance with real infra scoring
  };

  var total = 0;
  for (var key in weights) {
    if (scores.hasOwnProperty(key)) {
      total += scores[key] * weights[key];
    }
  }

  return Math.round(total);
}

function scoreProperty(property, cfg, stage) {
  // Score property for given stage (S1–S5)
  // Stage-specific weights: S1 prioritizes newness/trending, S2 prioritizes price/RTM, etc.

  stage = stage || 2; // default to S2

  var scores = {
    price: scorePriceTier((cfg.filters || {}).budgetMin, (cfg.filters || {}).budgetMax, parsePriceLakhs(property.price)),
    bhk: (cfg.filters || {}).bhk && (cfg.filters || {}).bhk.length ?
         ((cfg.filters || {}).bhk.some(function(b) { return property.bhk && property.bhk.includes(b.charAt(0)); }) ? 100 : 30) : 50,
    rtm: (cfg.filters || {}).readyToMove === 'yes' ? (property.ready_to_move ? 100 : 0) : 50,
    newness: 50, // would need property.isNew metadata
    demand: 50   // would need property.viewCount metadata
  };

  // Stage-specific weights
  var weights;
  switch (stage) {
    case 1: // S1 Discovery: budget & trending matter
      weights = { price: 0.40, bhk: 0.20, newness: 0.30, demand: 0.10 };
      break;
    case 2: // S2 Locality aware: price & availability
      weights = { price: 0.30, bhk: 0.25, rtm: 0.25, newness: 0.20 };
      break;
    case 3: // S3 Comparison: all matter equally
      weights = { price: 0.25, bhk: 0.25, rtm: 0.25, newness: 0.25 };
      break;
    case 4: // S4 Decision: RTM critical
      weights = { price: 0.35, rtm: 0.40, bhk: 0.25 };
      break;
    default:
      weights = { price: 0.35, bhk: 0.35, rtm: 0.30 };
  }

  var total = 0;
  for (var key in weights) {
    if (scores.hasOwnProperty(key)) {
      total += (scores[key] || 0) * weights[key];
    }
  }

  return Math.round(total);
}

// ── Location Cache Helpers ──────────────────────────────────────────────────
function generateLocationKey(location) {
  var primary = (location.primary || '').toLowerCase().replace(/\s+/g, '-');
  var city = (location.city || '').toLowerCase().replace(/\s+/g, '-');
  return city + '/' + primary;
}

async function cacheInSupabase(locationKey, data, ttlSeconds) {
  if (!window.SUPABASE_URL) {
    console.log('[cache] Supabase not configured, skipping');
    return;
  }

  try {
    var expiresAt = new Date(Date.now() + ttlSeconds * 1000).toISOString();
    console.log('[cache] Writing to Supabase:', locationKey);

    var result = await supabase.from('location_cache').upsert({
      location_key: locationKey,
      payload: data,
      expires_at: expiresAt,
      updated_at: new Date().toISOString()
    });

    if (result.error) throw result.error;
    console.log('[cache] ✓ Cached successfully');
  } catch (err) {
    console.warn('[cache] Failed to write:', err.message);
  }
}

async function getFromSupabaseCache(locationKey) {
  if (!window.SUPABASE_URL) return null;

  try {
    console.log('[cache] Reading from Supabase:', locationKey);

    var result = await supabase
      .from('location_cache')
      .select('*')
      .eq('location_key', locationKey)
      .single();

    if (result.error || !result.data) {
      console.log('[cache] Cache miss');
      return null;
    }

    var isStale = new Date(result.data.expires_at) < new Date();
    console.log('[cache] ✓ Found', isStale ? 'STALE' : 'FRESH', 'data');

    return {
      payload: result.data.payload,
      isStale: isStale,
      age: Math.round((Date.now() - new Date(result.data.updated_at)) / 1000 / 60)
    };
  } catch (err) {
    console.warn('[cache] Failed to read:', err.message);
    return null;
  }
}

// Normalize any API response shape → homepage property shape
function normalizeProps(raw, fallbackLoc) {
  return raw.map(function(p) {
    // Price: try various field names, fallback to computing from min_price
    const priceL = p.min_price ? Math.round(p.min_price / 100000) : null;
    const priceCr = priceL && priceL >= 100 ? (priceL/100).toFixed(2)+' Cr' : null;
    const priceStr = p.price_str || p.PRICE || p.price
      || (priceCr ? '₹'+priceCr : priceL ? '₹'+priceL+'L' : '₹—');
    // Sqft
    const area = p.carpet_area || p.SUPER_AREA || p.built_up_area || p.area || '';
    const sqft = area ? (typeof area === 'number' ? area+' sq ft' : area) : '';
    // BHK
    const bhk = p.bhk_types || p.BEDROOM_NUM || p.bedroom_num
      || (p.bedroom ? p.bedroom+' BHK' : p.PROP_BED ? p.PROP_BED+' BHK' : '2 BHK');
    // Name / developer
    const name = p.project_name || p.PROP_NAME || p.name || p.title || 'Property';
    const dev  = p.developer || p.DEVELOPER || p.company_name || '';
    // Location
    const loc  = p.location || p.address || p.locality_name
      || (p.LOCALITY_NAME ? p.LOCALITY_NAME+', '+p.CITY_NAME : fallbackLoc);
    // Status
    const rtm  = p.ready_to_move === true || p.ready_to_move === 1
      || (typeof p.status === 'string' && /ready/i.test(p.status))
      || (typeof p.STATUS === 'string' && /ready/i.test(p.STATUS));
    const status = p.status || p.STATUS || (rtm ? 'Ready to move' : 'Under Construction');
    return {
      name, dev, location: loc, price: priceStr, sqft,
      bhk: typeof bhk === 'number' ? bhk+' BHK' : bhk,
      status, ready_to_move: rtm,
      lm: p.lm || p.landmark || '',
      image_url: p.image_url || p.PHOTO_URL || p.photo || ''
    };
  });
}

// Tries to fetch actual property data and locality metadata from real_properties / real_localities tables
async function fetchRealDataFromSupabase(cfg) {
  const loc = cfg.location||{};
  const primary = loc.primary || '';
  const city = (loc.city || '').toLowerCase();

  if (!primary || !city) {
    console.log('[real-data] Missing primary location or city, skipping');
    return null;
  }

  try {
    // Check if Supabase is available
    if (!window.supabase_client && typeof supabase === 'undefined') {
      console.log('[real-data] Supabase not initialized');
      return null;
    }

    const sb = window.supabase_client || supabase;

    // Fetch properties matching city and locality
    console.log('[real-data] Fetching properties for', city, '/', primary);
    const { data: propData, error: propError } = await sb
      .from('real_properties')
      .select('*')
      .eq('city', city)
      .eq('locality', primary)
      .limit(20);

    if (propError) {
      console.log('[real-data] Properties fetch error:', propError);
      return null;
    }

    if (!propData || propData.length === 0) {
      console.log('[real-data] No properties found for', city, '/', primary);
      return null;
    }

    console.log('[real-data] Found', propData.length, 'properties');

    // Fetch localities metadata for this city
    console.log('[real-data] Fetching localities for', city);
    const { data: locData, error: locError } = await sb
      .from('real_localities')
      .select('*')
      .eq('city', city)
      .limit(20);

    if (locError) {
      console.log('[real-data] Localities fetch error:', locError);
      return null;
    }

    // Transform Supabase data to match our expected format
    const properties = propData.map(p => ({
      name: p.name || 'Property',
      dev: p.developer || '',
      location: [primary, city].join(', '),
      price: p.price_avg_sqft ? '₹' + (p.price_min || 'varying') + 'L' : '₹—',
      sqft: p.area_sqft ? p.area_sqft + ' sq ft' : '',
      bhk: (p.bhk && p.bhk.length) ? p.bhk.join(', ') : '2 BHK',
      status: p.status || 'Under Construction',
      ready_to_move: p.ready_to_move || false,
      lm: p.landmarks?.metro ? (p.landmarks.metro + ' (metro)') : '',
      image_url: p.image_url || ''
    }));

    const localities = (locData || []).map(l => ({
      name: l.name,
      bhkRange: 'Varies',
      avgPsqft: l.avg_price_sqft || 0,
      yoy: l.yoy_growth || 0,
      metro: l.metro_distance_min ? l.metro_distance_min + ' km' : '',
      conn: 'Good connectivity',
      count: 'Various',
      featured: l.rank && l.rank <= 3
    }));

    console.log('[real-data] ✓ Returning real data:', properties.length, 'properties,', localities.length, 'localities');
    config.dataSource = 'real-data';

    return {
      properties: properties,
      localities: localities,
      adjacentLocalities: localities.slice(1, 5),
      landmarks: {}
    };
  } catch(err) {
    console.log('[real-data] Error fetching real data:', err.message);
    return null;
  }
}

// Simple heuristic-based commute estimation (in minutes)
function estimateCommute(locality, worksNear) {
  if (!locality || !worksNear) return null;

  const loc = String(locality).toLowerCase();
  const work = String(worksNear).toLowerCase();

  // Same locality/sector = 10 mins
  if (loc === work || loc.includes(work.split(' ')[0])) return 10;

  // Adjacent sectors/nearby = 15-20 mins
  if ((loc.includes('sector') && work.includes('sector')) ||
      (loc.includes('noida') && work.includes('noida'))) {
    const locNum = parseInt(loc.match(/\d+/)?.[0] || 0);
    const workNum = parseInt(work.match(/\d+/)?.[0] || 0);
    if (locNum && workNum) {
      const diff = Math.abs(locNum - workNum);
      if (diff <= 20) return 10 + (diff * 0.5);
    }
    return 18;
  }

  // Different city/far = 30+ mins
  return 35;
}

function modContextChips(stage, primary, secondary) {

// WIREFRAME-ALIGNED: modContinue now shows for all stages (S1-S5)
function modContinue(stage, primary, secondary) {
  if (stage < 2) return null;  // S2, S3, S4, S5 only
  if (!primary && stage !== 1) return null; // S1 is okay with no primary

  // PRIORITY: rawData → data → getMockData
  let props = [];

  // Try primary source (rawData from latest fetch)
  if (rawData && rawData.properties && rawData.properties.length > 0) {
    props = rawData.properties.slice(0, 2);
  }
  // Try secondary source (currently filtered data)
  else if (data && data.properties && data.properties.length > 0) {
    props = data.properties.slice(0, 2);
  }
  // Fallback to mock data - this ALWAYS works
  else {
    const mockData = getMockData(config);
    if (mockData && mockData.properties) {
      props = mockData.properties.slice(0, 2);
    }
  }

  if (!props || props.length === 0) return null; // No data, skip

  const lastDays = config.lastVisitDaysAgo;
  const timeBadge = !lastDays || lastDays === 0 ? 'Today'
    : lastDays === 1 ? '1d ago' : `${lastDays}d ago`;

  // Simple version for S1-S2 (early discovery/locality stages)
  // Rich version for S3+ (comparison/decision stages with more engagement)
  const isEarlyStage = stage < 3;

  if (isEarlyStage) {

      return `<div class="ds-prop-card">

          <div class="text-xs text-tertiary mt-4">${esc(p.lm ? p.lm.split('·')[0].trim() : '')}</div>

    return `<div class="sec">
      <div class="sec-pad" style="padding-bottom:8px;">

        <div class="ds-heading-sub">Properties you recently viewed</div>
      </div>
      <div class="grid-2-col" style="padding:0 14px 12px;">
        ${cards}
      </div>
    </div>`;
  }

  // ── RICH VERSION: Full details for engaged users (S3+) ──
  const cards = props.map((p, i) => {
    const isMostViewed = i === 0;
    const noteKey = p.name || ('prop_cont_' + i);

    // View counts (simulated: first property gets more views)
    const viewCounts = [3, 1];
    const viewCount = viewCounts[i] || 1;

    // Feedback chips (simulated from property features)
    const feedbackChips = [
      ['Layout', '2 Car Parking', 'Open Kitchen'],
      ['Parking', 'Visit and confirm parking here']
    ];
    const chips = feedbackChips[i] || [];

    // Commute info
    const commute = config.user && config.user.worksNear ? estimateCommute(p.location, config.user.worksNear) : null;

    // Image with badges
    const imageBadges = `
      <div class="ds-prop-card-badges" style="left:10px;right:auto;gap:4px;">

        ${isMostViewed ? `<span class="ds-image-tag" style="background:#111827;color:#fff;font-weight:800;">MOST VIEWED</span>` : ''}
      </div>
      <button class="ds-shortlist ds-prop-card-shortlist" aria-label="Add to shortlist"><span class="material-icons" aria-hidden="true">favorite_border</span></button>
    `;

    return `<div class="card-rich">
      <div class="card-grid-2-img">
        <!-- Image -->
        <div class="card-image-box">
          ${propImg(p)}
          ${imageBadges}
        </div>
        <!-- Details -->
        <div>
          <div class="flex-center gap-sm mb-4 text-xs text-tertiary">
            <span class="material-icons" style="font-size:12px;">visibility</span> Viewed ${viewCount} time${viewCount > 1 ? 's' : ''}

          <div class="text-md font-bold text-primary mb-2">${esc(p.bhk||'2 BHK')} · ${esc(p.price||'₹—')}</div>

          ${commute ? `<div class="text-xs text-tertiary mb-6"><span class="material-icons" style="font-size:13px;vertical-align:-2px;">directions_car</span> ${commute} mins from ${config.user.worksNear}</div>` : ''}

function modNewInSectors(stage, primary, worksNear) {
  if (stage < 1 || stage > 3) return null;
  const f = config.filters || {};
  const selectedBhk = f.bhk && f.bhk.length ? f.bhk : null;
  const pool = rawData.properties || data.properties;

  // Filter: prefer properties matching BHK preference; if none match, fall back to unfiltered
  let newProps = pool.filter(p => !p.ready_to_move);
  if (selectedBhk) {
    const nums = selectedBhk.map(b => b.replace(/\D/g, ''));
    const bhkFiltered = newProps.filter(p => nums.indexOf((p.bhk||'').replace(/\D/g,'').charAt(0)) !== -1);
    if (bhkFiltered.length) newProps = bhkFiltered;
  }

  // Sort by commute time if worksNear is set
  if (worksNear) {
    newProps = newProps.sort((a, b) => {
      const commuteA = estimateCommute(a.location, worksNear) || 999;
      const commuteB = estimateCommute(b.location, worksNear) || 999;
      return commuteA - commuteB;
    });
  }

  newProps = newProps.slice(0, 4);
  if (!newProps.length) return null;

  const bhkLabel = selectedBhk ? selectedBhk.join(', ') : '';
  const budget = f.budgetMax ? `₹${f.budgetMin}L–₹${f.budgetMax}L` : '';
  const sub = [bhkLabel, budget].filter(Boolean).join(' · ');

  const cards = newProps.map((p, i) => {
    const freshTime = i === 0 ? 'Today' : `${i}d ago`;

    // Show commute time if worksNear is set, otherwise use default lm
    let featureText = '';
    if (worksNear) {
      const commute = estimateCommute(p.location, worksNear);
      featureText = commute ? `${commute} mins to ${worksNear}` : (p.lm ? p.lm.split('·')[0].trim() : '');
    } else {
      featureText = p.lm ? p.lm.split('·')[0].trim() : '';

    const featureTag = featureText
      ? `<div style="padding:7px 12px;border-top:1px solid rgba(108,48,212,0.12);font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--purple-text);background:var(--purple-light);">✦ ${esc(featureText)}</div>`
      : '';

    return `<div class="ds-prop-card">
      <div class="ds-prop-card-img">
        ${propImg(p)}
        <div class="ds-image-tags"><span class="ds-image-tag">${freshTime}</span></div>
        <button class="ds-shortlist ds-prop-card-shortlist" aria-label="Add to shortlist"><span class="material-icons" aria-hidden="true">favorite_border</span></button>
      </div>
      <div class="ds-prop-card-body">
        <div class="ds-prop-card-price">${esc(p.price)}</div>
        <div class="ds-prop-card-subtitle">${esc(p.bhk)} · ${esc(p.dev||'')}</div>
        <div class="ds-prop-card-name" style="font-size:var(--text-sm);">${esc(p.location||primary)}</div>
        <div class="text-xs text-tertiary mt-2">${esc(p.sqft||'')}${p.sqft?' · ':''}<span style="color:${p.ready_to_move?'var(--green)':'var(--text-tertiary)'}">${p.ready_to_move?'Ready to move':'UC'}</span></div>
        ${p.lm ? `<div class="text-xs text-tertiary mt-1" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.lm.split('·')[0].trim())}</div>` : ''}
      </div>

  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="ds-section-heading">Fresh Listings in ${esc(primary)}</div>

  </div>`;

function modLocalitySuggestions(stage, primary, secondary) {
  if (stage < 2 || stage > 3) return null;
  if (secondary) return null; // buyer has narrowed to two — H2H handles it

  const fallback = generateIntelligentMockData(config.location.city, primary);
  const allLocs = data.localities && data.localities.length ? data.localities : fallback.localities;

  // Find primary locality
  const targetLoc = allLocs.find(l => l.name.toLowerCase().trim() === primary.toLowerCase().trim());
  if (!targetLoc) return null;

  // Score all OTHER localities by relevance
  // FIRST: Try curated adjacentLocalities (expert-selected alternatives)
  let suggestions = [];
  if (data.adjacentLocalities && data.adjacentLocalities.length) {
    suggestions = data.adjacentLocalities
      .map(adj => {
        const locData = allLocs.find(l => l.name === adj.name);
        return { ...locData, ...adj, score: 100 };
      })
      .filter(s => s && s.name)
      .slice(0, 4);
  }

  // FALLBACK: Score all localities by relevance
  if (!suggestions.length) {
    suggestions = allLocs
      .filter(l => l.name.toLowerCase().trim() !== primary.toLowerCase().trim())
      .map(l => ({
        ...l,
        score: scoreLocality(targetLoc, l, config)
      }))
      .sort(function(a, b) { return b.score - a.score; })
      .slice(0, 4);
  }

  if (!suggestions.length) return null;

  const cards = suggestions.map(l => {
    const yoy = l.yoy || 14;
    const metro = l.metro || '~1km';
    const insight = yoy >= 14 ? `${yoy}% YoY growth — highest potential` : `Strong value at ₹${(l.avgPsqft||'—').toLocaleString()}/sqft`;
    return `<div style="flex-shrink:0;width:220px;background:var(--surface);border:1px solid var(--border-medium);border-radius:var(--radius-md);padding:12px;display:flex;flex-direction:column;">
      <div style="font-size:var(--text-base);font-weight:var(--weight-bold);color:var(--text-primary);margin-bottom:2px;">${esc(l.name)}</div>
      <div class="ds-heading-sub">${esc(l.bhkRange||'')}</div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:3px;flex:1;">
        <div style="font-size:var(--text-sm);color:var(--text-secondary);">📈 ${yoy}% YoY · 🚇 ${esc(metro)}</div>
        <div style="font-size:var(--text-sm);color:var(--text-secondary);">₹${(l.avgPsqft||'—').toLocaleString()}/sqft</div>
        <div style="font-size:var(--text-xs);color:var(--text-primary);background:var(--blue-light);padding:4px 6px;border-radius:4px;margin-top:4px;">✦ ${insight}</div>
      </div>
      <button class="ds-btn ds-btn-tertiary ds-btn-sm" style="width:100%;margin-top:10px;">View ${esc(l.count||'')} →</button>
    </div>`;
  }).join('');

  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="ds-section-heading">Localities that match your search</div>
      <div class="ds-heading-sub">Ranked by relevance to ${esc(primary)}</div>
    </div>
    <div class="hscroll" style="padding-bottom:12px;">${cards}</div>
    <div style="padding:6px 14px 0;">
      <div class="ds-subsection-heading">What matters most in your daily life?</div>
      <div class="ds-heading-sub">We'll prioritise localities that match</div>
    </div>
    <div class="pref-row">
      <div class="ds-chip ds-chip-sm active">🚇 Metro</div>
      <div class="ds-chip ds-chip-sm">🏥 Hospital</div>
      <div class="ds-chip ds-chip-sm">🏫 School</div>
      <div class="ds-chip ds-chip-sm">🛒 Marketplace</div>
      <div class="ds-chip ds-chip-sm"><span class="material-icons" aria-hidden="true" style="font-size:14px;">add</span> Add landmark</div>
    </div>
  </div>`;
}

function modLocalitiesRadar(stage, city, primary) {
  if (stage < 2 || stage > 3) return null;  // S2-S3

  // For S2: Show recently viewed + nearby suggestions in one consolidated view
  const props = data.properties || [];
  if (!props.length) return null;

  // Extract unique localities from recently viewed properties
  const localityMap = {};
  props.forEach(p => {
    if (p.location) {
      // Extract just the locality name (first part before comma)
      const fullLoc = p.location;
      const cleanLoc = fullLoc.split(',')[0].trim();
      if (!localityMap[cleanLoc] && (cleanLoc.includes('Sector') || cleanLoc.includes('Road') || cleanLoc.includes('West') || cleanLoc.includes('East') || cleanLoc.includes('North') || cleanLoc.includes('South'))) {
        localityMap[cleanLoc] = true;
      }
    }
  });

  const uniqueLocalities = Object.keys(localityMap);
  const fallback = getMockData(config);
  const allLocs = data.localities && data.localities.length ? data.localities : fallback.localities;
  const adjs = data.adjacentLocalities && data.adjacentLocalities.length ? data.adjacentLocalities : fallback.adjacentLocalities;

  // Combine: recently viewed (with stars) + suggested alternatives (lighter styling)
  const allCards = [];

  // Add recently viewed (max 3)
  uniqueLocalities.slice(0, 3).forEach((locName, idx) => {
    const locMeta = allLocs.find(l => l.name && l.name.trim() === locName);
    const isBold = idx === 0;
    allCards.push({
      name: locName,
      meta: locMeta,
      isSuggested: false,
      isPrimary: isBold,
      distance: null
    });
  });

  // Add suggested alternatives (max 2)
  adjs.slice(0, 2).forEach(adj => {
    if (!uniqueLocalities.includes(adj.name)) {
      const locMeta = allLocs.find(l => l.name === adj.name);
      allCards.push({
        name: adj.name,
        meta: locMeta || adj,
        isSuggested: true,
        isPrimary: false,
        distance: adj.delta
      });
    }
  });

  const cards = allCards.map(card => {
    const opacity = card.isSuggested ? 0.85 : 1;
    const borderColor = card.isSuggested ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.16)';
    const badgeHtml = card.isPrimary
      ? '<div style="display:inline-block;background:rgba(255,193,7,0.2);color:#f59e0b;font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;margin-bottom:6px;">⭐ PRIMARY</div>'
      : card.isSuggested
      ? `<div style="display:inline-block;background:rgba(59,130,246,0.15);color:#2563eb;font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;margin-bottom:6px;">💡 SUGGESTED</div>`
      : '';

    return `<div style="flex-shrink:0;width:220px;background:white;border:1px solid ${borderColor};border-radius:8px;padding:12px;opacity:${opacity};display:flex;flex-direction:column;">
      ${badgeHtml}
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">
        <div style="flex:1;"><div style="font-size:13px;font-weight:800;color:var(--text);">${esc(card.name)}</div></div>
      </div>
      ${card.isSuggested ? `<div style="font-size:10px;color:var(--text2);margin-bottom:8px;">≈ ${Math.abs(card.distance).toFixed(1)}km from ${esc(primary)}</div>` : ''}
      <div style="font-size:12px;color:#555555;margin-bottom:8px;">${esc(card.meta?.bhkRange||'2-3 BHK')}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;"><span style="color:#999999;">₹/sqft</span><span style="color:#111111;font-weight:700;">₹${card.meta?.avgPsqft||'—'}</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;"><span style="color:#999999;">Price growth</span><span style="color:#16a34a;font-weight:700;">+${card.meta?.yoy||'—'}% YoY</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px;flex:1;"><span style="color:#999999;">Metro</span><span style="color:#111111;font-weight:700;">${esc(card.meta?.metro||'—')}</span></div>
      <button class="ds-btn ds-btn-tertiary ds-btn-xs" style="width:100%;margin-top:auto;">View properties →</button>
    </div>`;
  }).join('');

  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div class="ds-section-heading">Localities on your radar</div>
      <div class="ds-heading-sub">Your top views + nearby alternatives</div>
    </div>
    <div class="hscroll">${cards}</div>
  </div>`;
}

            <td style="padding:9px 12px;font-weight:700;color:var(--text-primary);text-align:center;">${r.win===0?`<span style="color:var(--green);">${esc(r.v1)}</span>`:esc(r.v1)}</td>
            <td style="padding:9px 12px;font-weight:700;color:var(--text-primary);text-align:center;">${r.win===1?`<span style="color:var(--green);">${esc(r.v2)}</span>`:esc(r.v2)}</td>

function modPropertiesPrimary(stage, primary, secondary, worksNear) {
  if (stage === 4 || stage === 5) return null;  // Show S1, S2, S3 per wireframes

  // ── INTELLIGENT FALLBACK FILTERING ──
  // Stage 1: Filter by exact primary location
  let candidateProperties = data.properties.filter(p => p.location.includes(primary));
  let fallbackType = null;

  // Stage 2: If empty, try adjacent localities
  if (!candidateProperties.length && (data.adjacentLocalities || []).length > 0) {
    const adjacentNames = data.adjacentLocalities.map(a => a.name);
    candidateProperties = data.properties.filter(p =>
      adjacentNames.some(adj => p.location.includes(adj))
    );
    if (candidateProperties.length) fallbackType = 'adjacent';
  }

  // Stage 3: If still empty, try same price tier (±30%)
  if (!candidateProperties.length) {
    const targetLoc = data.localities && data.localities.find(l =>
      l.name.toLowerCase().includes(primary.toLowerCase())
    );
    if (targetLoc) {
      const priceBand = targetLoc.avgPsqft * 0.3;
      candidateProperties = data.properties.filter(p => {
        const pPrice = parsePriceLakhs(p.price);
        return Math.abs(pPrice - targetLoc.avgPsqft) <= priceBand;
      });
      if (candidateProperties.length) fallbackType = 'price-tier';
    }
  }

  // If still empty, show message
  if (!candidateProperties.length) {
    return `<div class="sec sec-pad"><div class="empty"><div class="empty-icon">🏠</div><div class="empty-title">No listings available</div><div class="empty-sub">Properties for ${esc(primary)} are being curated. Check back soon!</div></div></div>`;
  }

  // Score each property using stage-aware scoring, and enrich with commute time if worksNear is set
  const scored = candidateProperties
    .map(p => {
      const propWithScore = {
        ...p,
        score: scoreProperty(p, config, stage)
      };
      // Add commute info to lm field if worksNear is available
      if (worksNear) {
        const commute = estimateCommute(p.location, worksNear);
        if (commute) {
          propWithScore.lm = `${commute} mins to ${worksNear}${p.lm ? ' · ' + p.lm : ''}`;
        }
      }
      return propWithScore;
    })
    .sort(function(a, b) { return b.score - a.score; });

  // ── LABEL & TRANSPARENCY ──
  let label = `Properties in ${esc(primary)}`;
  let transparencyBadge = '';

  if (fallbackType === 'adjacent') {
    label = `Properties near ${esc(primary)}`;
    transparencyBadge = `<div style="background:#fef3c7;border-left:3px solid #f59e0b;padding:8px 12px;margin-bottom:8px;border-radius:4px;font-size:12px;color:#78350f;">
      📍 Limited listings in ${esc(primary)}. Showing nearby areas (Sectors 128, 137, 143, etc).
    </div>`;
  } else if (fallbackType === 'price-tier') {
    label = `Similar-priced properties to ${esc(primary)}`;
    transparencyBadge = `<div style="background:#f0fdf4;border-left:3px solid #16a34a;padding:8px 12px;margin-bottom:8px;border-radius:4px;font-size:12px;color:#15803d;">
      💰 Showing properties in your budget range. Perfect for comparing options.
    </div>`;
  }

  if (stage === 3 && secondary) {
    // S3: split into two groups by location, scored within each group
    const primary_props = scored.filter(p => p.location.includes(primary)).slice(0, 3);
    const secondary_props = scored.filter(p => p.location.includes(secondary)).slice(0, 3);

    return `<div class="sec">
      <div class="group-label"><div class="group-dot"></div>${esc(primary)}</div>
      <div class="hscroll">${primary_props.map((p,i)=>propCard(p,{showBadge:p.score>70,horizontal:true})).join('')}</div>
      <div class="group-label" style="margin-top:4px;"><div class="group-dot orange"></div>${esc(secondary)}</div>
      <div class="hscroll">${secondary_props.map(p=>propCard(p,{showBadge:p.score>70,horizontal:true})).join('')}</div>
      <div style="padding:4px 10px 12px;"><a style="color:var(--blue);font-size:var(--text-sm);font-weight:var(--weight-semibold);cursor:pointer;text-decoration:none;">See all 9+ properties</a></div>
    </div>`;
  }

  // S2: show top-scored properties
  const topProps = scored.slice(0, 6);
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding:0 20px;">
        <div class="ds-section-heading">${label}</div>
        <a style="color:var(--blue);font-size:var(--text-sm);font-weight:var(--weight-semibold);cursor:pointer;text-decoration:none;">See all ${candidateProperties.length > 4 ? candidateProperties.length+'+' : ''}</a>
      </div>
    </div>
    ${transparencyBadge}
    <div class="hscroll">${topProps.map((p,i)=>propCard(p,{showBadge:p.score>70,horizontal:true})).join('')}</div>
  </div>`;
}

function modNearbyLocalities(stage, primary) {
  if (stage < 2 || stage > 3) return null;  // Show S2-S3 only
  const adjs = data.adjacentLocalities.length ? data.adjacentLocalities : getMockData(config).adjacentLocalities;
  const propPool = data.properties.length > 5 ? data.properties : getMockData(config).properties;

  const cards = adjs.slice(0, 2).map((a, ai) => {
    // For this adjacent locality, filter and score all properties in it
    const adjProps = propPool
      .filter(p => p.location.includes(a.name))
      .map(p => ({
        ...p,
        score: scoreProperty(p, config, stage)
      }))
      .sort(function(a, b) { return b.score - a.score; })
      .slice(0, 2);  // Top 2 properties from this adjacent locality

    // If no properties found, use generic samples from pool
    const ap = adjProps.length > 0 ? adjProps : propPool.slice(3 + ai * 2, 5 + ai * 2);

    return `<div>
      <div class="group-label" style="padding:8px 14px 4px;font-size:13px;"><div class="group-dot" style="background:var(--green)"></div>${esc(a.name)} · ${esc(a.label)} vs ${esc(primary)}</div>
      <div class="prop-grid" style="margin-bottom:4px;">
        ${ap.map(p=>`<div class="prop-sm">
          <div class="prop-sm-img">${propImg(p)}</div>
          <div class="prop-sm-body">
            <div class="prop-sm-price">${esc(p.price)}</div>
            <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:2px;">${esc(p.bhk||'')}</div>

            <div class="prop-sm-landmark">${esc(a.metro||'')}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  const saving = adjs[0] ? adjs[0].delta : 6;
  return `<div class="sec">
    <div class="sec-pad" style="padding-bottom:4px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding:0 20px;"><div class="ds-section-heading">Nearby Localities</div><a style="color:var(--blue);font-size:var(--text-sm);font-weight:var(--weight-semibold);cursor:pointer;text-decoration:none;">See all 3</a></div>
    </div>
    ${cards}
  </div>`;
}

function modBudgetFit(stage, f, primary, secondary) {
  if (stage > 3) return null;
  const max = f.budgetMax || 0;
  if (!max) return null;

  const loc = data.localities[0] || getMockData(config).localities[0];
  if (!loc || !loc.avgPsqft) return null;

  let headline, bodyText, btnText;
  if (stage === 3 && secondary) {
    const loc2 = data.localities[1] || getMockData(config).localities[1];
    if (loc2 && loc2.avgPsqft) {
      const sqft1 = Math.round(max * 100000 / loc.avgPsqft / 10) * 10;
      const sqft2 = Math.round(max * 100000 / loc2.avgPsqft / 10) * 10;
      const bigger = sqft2 > sqft1 ? secondary : primary;
      headline = `₹${max}L unlocks more space in ${esc(bigger)}`;
      bodyText = `${esc(primary)}: ~${sqft1} sq ft · ${esc(secondary)}: ~${sqft2} sq ft at the same budget.`;
      btnText = `See properties in ${esc(bigger)}`;
    } else {
      return null;
    }
  } else {
    const areaEntry = Math.round(loc.avgPsqft * 900 / 100000);
    if (max < areaEntry) {
      headline = `Budget is tight for ${esc(primary)}`;
      bodyText = `Most 2 BHKs start around ₹${areaEntry}L. Explore nearby localities with better value.`;
    } else if (max > areaEntry * 1.4) {
      headline = `Your budget opens premium options`;
      bodyText = `₹${max}L qualifies for 3 BHKs and best-in-class developments.`;
    } else {
      headline = `₹${max}L works well in ${esc(primary)}`;
      bodyText = `Expect a well-sized 2 BHK with options across the locality.`;
    }
    btnText = 'See properties';
  }

  return `<div class="sec sec-pad">
    <div class="ds-insight">
      <div class="ds-insight-head">
        <div class="ds-insight-title-row">
          <span class="ds-insight-icon material-icons" aria-hidden="true">auto_awesome</span>
          <span class="ds-insight-title">${headline}</span>
        </div>
      </div>
      <div class="ds-insight-sub">${bodyText}</div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="ds-btn ds-btn-sm ds-btn-primary">${btnText}</button>
        <button class="ds-btn ds-btn-sm ds-btn-tertiary">Adjust budget</button>
      </div>
    </div>
  </div>`;
}

function modStillConsidering(stage, primary) {
  if (stage !== 4 && stage !== 5) return null;

      if (diff < 0) { delta = `₹${Math.abs(diff)}L cheaper`; isGood = true; }
      else if (diff > 0) { delta = `₹${diff}L more`; isGood = false; }

    const landmarkDist = p.lm ? p.lm.split('·').slice(1).join('·').trim() : '';

    const newBadge = !p.ready_to_move ? `<div style="position:absolute;top:8px;left:8px;background:#111827;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;">NEW</div>` : '';

          ${delta ? `<div class="text-xs text-tertiary mb-4"><span style="color:${isGood?'var(--green)':'var(--text-tertiary)'};font-weight:${isGood?'700':'400'};"><span aria-hidden="true">${isGood?'✓':'•'}</span> ${esc(delta)}</span></div>` : ''}

// ── Shared prop card ──────────────────────────────────────────────────────────
function propCard(p, opts) {
  opts = opts || {};
  const isH = !!opts.horizontal;
  const showNew = !!opts.showBadge;
  const cls = isH ? 'ds-prop-card horizontal' : 'ds-prop-card';

  // Badges on image
  const badges = [];
  badges.push(`<div class="ds-image-tag"><span class="material-icons" aria-hidden="true" style="font-size:12px;">verified</span> RERA</div>`);
  if (p.ready_to_move) badges.push(`<div class="ds-image-tag" style="background:rgba(22,163,74,0.85);">Ready to move</div>`);
  else if (showNew)     badges.push(`<div class="ds-image-tag" style="background:rgba(37,99,235,0.88);">New</div>`);

  // Tags in body
  const tags = [];
  if (p.ready_to_move) tags.push(`<div class="ds-prop-card-tag" style="color:var(--green);background:var(--green-light);">Ready to move</div>`);
  if (p.plan)          tags.push(`<div class="ds-prop-card-tag">${esc(p.plan)}</div>`);
  if (p.rera)          tags.push(`<div class="ds-prop-card-tag"><span class="material-icons" aria-hidden="true" style="font-size:11px;vertical-align:-1px;">verified</span> RERA</div>`);

  const tagsHtml = tags.length ? `<div class="ds-prop-card-tags">${tags.join('')}</div>` : '';
  const highlights = p.lm ? `<div class="ds-prop-card-highlights">${esc(p.lm)}</div>` : '';

  return `<div class="${cls}">
    <div class="ds-prop-card-img">
      ${propImg(p)}
      <div class="ds-prop-card-badges">${badges.join('')}</div>
      <button class="ds-shortlist ds-prop-card-shortlist" aria-label="Save ${esc(p.name || 'property')} to shortlist"><span class="material-icons" aria-hidden="true">favorite_border</span></button>
      <div class="ds-prop-card-possession">
        <span>${esc(p.status || (p.ready_to_move ? 'Ready to move' : 'Under Construction'))}</span>
      </div>
    </div>
    <div class="ds-prop-card-body">
      <div class="ds-prop-card-price">${esc(p.price || '₹—')}</div>
      ${p.psqft ? `<div class="ds-prop-card-price-detail"><span>${esc(p.psqft)}/sqft</span><span>${esc(p.sqft||'')} sqft</span></div>` : ''}
      <div class="ds-prop-card-title-row">
        <div class="ds-prop-card-name">${esc(p.name || 'Property')}</div>
        ${showNew ? `<span class="ds-prop-card-badge-new">New</span>` : ''}
      </div>
      <div class="ds-prop-card-subtitle">${esc(p.bhk || '')}${p.dev ? ' · ' + esc(p.dev) : ''}</div>
      ${tagsHtml}
      ${!isH ? highlights : ''}
    </div>
    ${!isH ? `<div class="ds-prop-card-actions">
      <button class="ds-btn ds-btn-sm ds-btn-secondary">Contact Seller</button>
      <button class="ds-btn ds-btn-sm ds-btn-primary">View Number</button>
    </div>` : ''}
  </div>`;
}

// ── Sticky notes — delegate from #page ────────────────────────────────────────
document.getElementById('page').addEventListener('input', function(e) {
  const ta = e.target.closest('.prop-note-input');
  if (ta) {
    const key = ta.dataset.propkey;
    propNotes[key] = ta.value;
    // Update note display in both prop-note-wrap and card-chips-wrap contexts
    const wrap = ta.closest('.prop-note-wrap') || ta.closest('.card-chips-wrap');
    if (wrap) {
      let disp = wrap.querySelector('.prop-note-display');
      if (ta.value) {
        if (!disp) {
          disp = document.createElement('div');
          disp.className = 'prop-note-display';
          wrap.insertBefore(disp, wrap.firstChild);
        }
        disp.textContent = '📝 "' + ta.value + '"';
      } else if (disp) {
        disp.remove();
      }
    }
    // Update note button appearance — amber + "Edit note" when note exists
    const cardActions = ta.nextElementSibling;
    if (cardActions && cardActions.classList.contains('card-actions')) {
      const noteBtn = cardActions.querySelector('.note-act');
      if (noteBtn) {
        const hasNote = !!ta.value;
        noteBtn.classList.toggle('has-note', hasNote);
        noteBtn.innerHTML = '<span class="material-icons" aria-hidden="true">' + (hasNote ? 'edit_note' : 'add_comment') + '</span>' + (hasNote ? 'Edit note' : 'Add a note');
      }
    }
  }
});

// ── Per-card actions — delegate from #page ────────────────────────────────────
document.getElementById('page').addEventListener('click', function(e) {
  // "Not for me" toggle
  const passBtn = e.target.closest('[data-rlabel="pass"]');
  if (passBtn) {
    const key = passBtn.dataset.rkey;
    propChips[key] = propChips[key] === 'pass' ? '' : 'pass';
    const active = propChips[key] === 'pass';
    passBtn.className = 'card-act pass-act' + (active ? ' active' : '');
    passBtn.innerHTML = '<span class="material-icons" aria-hidden="true">close</span>' + (active ? 'Removed' : 'Not for me');
    return;
  }
  // Note toggle
  const toggle = e.target.closest('[data-notetoggle]');
  if (toggle && toggle.classList.contains('card-act')) {
    const key = toggle.dataset.notetoggle;
    const wrap = toggle.closest('.card-actions');
    if (!wrap) return;
    const ta = wrap.previousElementSibling;
    if (ta && ta.classList.contains('prop-note-input')) {
      ta.classList.toggle('hidden');
      if (!ta.classList.contains('hidden')) ta.focus();
    }
    return;
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
var _supaUrl = (typeof window !== 'undefined' && window.SUPABASE_URL)  || '';
var _supaKey = (typeof window !== 'undefined' && window.SUPABASE_ANON_KEY) || '';

console.log('[init] page URL:', window.location.href);
console.log('[init] Supabase configured:', !!_supaUrl, 'window.supabase:', !!window.supabase);

// Initialize Supabase client if not already initialized by config.js
if (_supaUrl && _supaKey && typeof supabase !== 'undefined' && !window.supabase) {
  try {
    window.supabase = supabase.createClient(_supaUrl, _supaKey);
    console.log('[init] ✓ Created Supabase client for real-time');
  } catch(e) {
    console.log('[init] Could not create Supabase client:', e.message);
  }
}

// ────────────────────────────────────────────────────────────────────────────
// PRIORITY: Panel (postMessage) > Supabase > Demo fallback
// NOTE: Always try panel mode first - don't rely on iframe detection
// ────────────────────────────────────────────────────────────────────────────

// Signal to parent that homepage is ready (works in iframe)
function _signalReady() {
  if (_panelConnected) return;
  try {
    window.parent.postMessage({ type: 'HOMEPAGE_READY' }, '*');
  } catch(e) {
    // Silently fail if not in iframe
  }
}

// Send signal immediately and keep retrying every 300ms indefinitely
console.log('[init] → Waiting for panel to send config...');
_signalReady();
var _readyTimer = setInterval(function() {
  if (_panelConnected) {
    console.log('[init] ✓ Panel connected! Stopping ready signals.');
    clearInterval(_readyTimer);
    return;
  }
  _signalReady();
}, 300);

// ── Supabase real-time subscription for standalone mode ──────────────────────
// Subscribe to live_config table so standalone homepage stays in sync with panel
setTimeout(function() {
  console.log('[init] Attempting real-time subscription setup...');
  console.log('[init] _supaUrl:', !!_supaUrl, '_supaKey:', !!_supaKey);
  console.log('[init] typeof supabase:', typeof supabase);

  // Create Supabase client if not already created
  if (_supaUrl && _supaKey && typeof supabase !== 'undefined' && !window._sbClient) {
    try {
      window._sbClient = supabase.createClient(_supaUrl, _supaKey);
      console.log('[init] ✓ Created Supabase client');
    } catch(e) {
      console.log('[init] ✗ Failed to create client:', e.message);
      return;
    }
  }

  var sb = window._sbClient;
  if (!sb) {
    console.log('[init] ✗ No Supabase client available');
    return;
  }

  try {
    console.log('[init] Setting up real-time subscription to live_config...');
    var channel = sb.channel('live_config_changes');
    channel
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'live_config',
        filter: 'id=eq.default'
      }, function(payload) {
        console.log('[supabase-realtime] ✓ Change detected:', payload.eventType);
        if (payload.new && payload.new.config) {
          console.log('[supabase-realtime] → Applying new config');
          config = Object.assign(defaultConfig(), payload.new.config || {});
          fetchAndRender();
        }
      })
      .subscribe(function(status) {
        console.log('[supabase-realtime] Subscription status:', status);
      });
    console.log('[init] ✓ Real-time subscription active');
  } catch(err) {
    console.log('[init] ✗ Subscription error:', err.message);
  }
}, 1000);

// Load demo config immediately (for standalone usage)
// When panel connects via postMessage, it will override this with real config
console.log('[init] Loading demo config for standalone/fallback...');
console.log('%c📋 HOW TO USE THIS SYSTEM:', 'color: #2563eb; font-size: 14px; font-weight: bold;');
console.log('%c1. RECOMMENDED: Open /panel/index.html', 'color: #16a34a; font-weight: bold;');
console.log('   → The researcher panel with embedded homepage preview');
console.log('   → Select personas from the dropdown to test different stages');
console.log('%c2. ALTERNATIVE: Open /homepage/index.html directly', 'color: #16a34a; font-weight: bold;');
console.log('   → Standalone mode: syncs with panel via Supabase');
console.log('%c3. IMAGES: For images to load, serve files over HTTP:', 'color: #dc2626; font-weight: bold;');
console.log('   → Run: python3 -m http.server 8000');
console.log('   → Or: npx http-server');
console.log('   → Then open: http://localhost:8000/panel/index.html');
console.log('%cCONSOLE TIPS:', 'font-weight: bold;');
console.log('   • Watch for [img-load] messages when images load');
console.log('   • Watch for [img-error] if images fail (file:// protocol limitation)');
console.log('   • Watch for [homepage-listener] messages for panel-homepage sync');
console.log('   • Watch for [supabase-realtime] messages for standalone sync');
loadDemoConfig();

// After 30 seconds of waiting, log a warning but keep trying
setTimeout(function() {
  if (!_panelConnected) {
    console.warn('[init] ⚠ Panel connection taking longer than 30s. Make sure panel is open and iframe is loaded.');
  }
}, 30000);

// Helper function to load demo config
// Uses s2_locality_explorer (Priya Mehta) persona as default
function loadDemoConfig() {
  config = Object.assign(defaultConfig(), {
    stage: 2,
    location: { primary: 'Sector 137', secondary: null, city: 'Noida', openToNearby: true },
    filters: { bhk: ['2BHK'], budgetMin: 70, budgetMax: 95, readyToMove: 'either', buyTimeline: 'exploring' },
    lastVisitDaysAgo: 3,
    user: { name: 'Priya Mehta', age: 32, occupation: 'Product Manager', worksNear: 'Sector 62' }
  });
  fetchAndRender();
}
</script>
